"ST2": { date: "November 1771 – January 1772", ord: 17720112, canon: false, parts: [
  { head: "JANUARY 12, 1772.", text: `We read aloud, three evenings in the week — that is, I read, and Charlotte works, and Albert sits with his documents at the far table, half attending, like a man who keeps one boot in the stirrup. I teach the little ones their letters. Sophy can write WERTHER now with every letter facing forward — which is more, her sister says, laughing, than the original manages.

Wilhelm, I set down the change plainly, as a chronicler: she has ceased to give me her hand at parting. It was done without one word, the way frost is done. And once, when the talk at table was of a neighbour's long-staying guest, she said — not at me, past me, which is her way when it is at me — that the friend of a house is like the clock of a house: valued in its place, wound regularly, and never taken abroad. I laughed with the rest. I am the friend of the house. I repeated it to my chamber wall until the candle stood in a winding-sheet.` }
], choices: [
  { label: "They have fixed the day: the twentieth of February.", to: "ST3", canon: false }
]},

"ST3": { date: "20 February 1772 — the wedding", ord: 17720220, canon: false, parts: [
  { head: "FEBRUARY 20, 1772.", text: `It is done, Wilhelm. I stood in the church at S— among the wedding-guests, in my blue coat, and saw it done.

She wore white. I had seen the dress before — no matter. The ring went on; her father wept with a free old man's face; the children strewed winter-green, because there was nothing else to strew. Albert's joy was grave and quiet and past all argument, like a title-deed. And she — she was pale and clear and steady, Wilhelm, steady as the flame of a lamp in a shut room; and once, once only, in turning, her eyes crossed mine; and there was in them something that asked — not forgiveness, her debt-book is clean — say rather: something that took leave.

I stood upright the whole hour, as a man stands in cold water, by mere astonishment. At the feast I proposed no toast; I was not asked for one. Late, in the crowd at the door, she gave me her hand — before them all, you understand: where it meant nothing, and could mean nothing — and said, "Good night, dear Werther." Dear Werther! The word came exactly when it could come safely; and that, Wilhelm, is the anatomy of the whole.` }
], choices: [
  { label: "Leave to-night. A note for the household; the roads are frozen hard, and will carry you anywhere.",
    to: "ST4", log: "20 February 1772 — you fled from the wedding into the winter roads." },
  { label: "Remain. Where should I go? The world is everywhere the same.",
    to: "ST5", log: "20 February 1772 — you watched her married, and stayed." }
]},

"ST4": { date: "March–June 1772 — the roads", ord: 17720509, canon: false, parts: [
  { head: "MAY 9, 1772.", text: `I have been since February on the roads, Wilhelm, and in four towns whose names I have not troubled to learn. In March I made at last the pilgrimage I had so long promised myself, to my native place. By the great elm, a quarter of a league from the village, I left the horse and went in on foot: stood under the gateway my mother led me out at, after my father's death; found the schoolroom, where a good old woman penned up our childhood, made over into a shop. I followed the stream along which I used to run of an evening, to the place where we played ducks-and-drakes upon the water; and I remembered how I would stand and watch it go, with what wonderful surmises of the countries it must pass through — till my imagination gave out; and still the water ran on and on, and I stood bewildered before an invisible distance. So bounded, my dear friend, and so happy, were the blessed fathers of old! so childlike their feeling and their poetry. Man needs but little earth for enjoyment, and still less for his final repose.

I write this from an inn on the —— road. Do not ask my direction. I have discovered that all my roads have one fault in common: each of them, given time enough, can be made to bend toward a certain valley. I ride away from it by long detours. That is my whole geography now — away from; and the flaw in the method you will have found out long before I confess it.` }
], choices: [
  { label: "July. The method fails.", to: "N19", canon: true }
]},

"ST5": { date: "March–July 1772 — the permitted days", ord: 17720710, canon: false, parts: [
  { head: "JULY 10, 1772.", text: `The spring is gone, I hardly know where, and the summer stands deep in the lindens. I go out to the lodge — you will want the figure, chronicler that you are — every second day, and no oftener. I have made myself a calendar of permitted days, and keep it as the ambassador at D— is said to keep his particles.

In June came at last what I had long heard coming, as one hears a wagon on a far road. She said it — he had asked her to say it, which is his cleanness and his cruelty in one: she said, walking in the garden, her eyes upon her work: "The world talks, Werther. Come to us — come always — but come more seldom." More seldom! There is a whole liturgy in it. I answered like a man of sense; I have that grimace by heart now.

And the walnut-trees at S— are felled — did I write it? The new vicar's wife had it done, for the sake of her clean yard; the whole village murmurs. The trees I sat under with her — but everything now is a tree I sat under with her: the whole country grows all one shade.` }
], choices: [
  { label: "August, and no change but the calendar's.", to: "N20", canon: true }
]},

/* ==================== BRANCH — FRÄULEIN B— ==================== */

"L1": { date: "April 1772 — the frost", ord: 17720414, canon: false, parts: [
  { head: "APRIL 14, 1772.", text: `The town has talked of nothing else these four weeks, and I write to you, Wilhelm, from the eye of the storm, strangely calm. The aunt has shut her door against me: the pedigree in her hall goes back, they say, to a crusader; and every man of it turned in his grave at once — which, in a family so numerous, makes a considerable noise. Two invitations have been withdrawn; at the club, three gentlemen have grown suddenly short-sighted. So much for the enemy.

Now for the other side. The Count C—, on the evening the thing broke, crossed the whole assembly-room — the same room, Wilhelm, the very floor — and gave me his arm before them all, and walked me twice round it, talking of Homer. I could have wept upon his neck. And she — she does not bow her head into the wind, Wilhelm; she straightens it. "You have chosen a bad season for your wooing," she said to me at her window, and her eyes were quick with a light I never saw in them at any assembly: "the whole town is one frost. Come again when it thaws." And she smiled as she said thaws; and I have been mad with the almanac ever since, for I cannot determine whether the word meant the weather, or the world, or the aunt, or her own heart. The meanings melt into one another. Let them melt: melting is the whole of my theology now.` }
], choices: [
  { label: "When it thaws.", to: "L2", canon: false }
]},

"L2": { date: "May 1772 — the thaw", ord: 17720520, canon: false, parts: [
  { head: "MAY 20.", text: `Wilhelm! — I set the word at the head of the letter as one plants a flag on a tower that is taken: she has said yes.

Not to the aunt's nephew-hunting, not to rank, not to the twelve quarterings — to me: to a discharged legation-secretary with a portfolio of drawings and a heart in questionable repair. She said it in the garden, by the espaliered pears, with her hands behind her like a girl saying a lesson; and when I could not speak — I, Wilhelm, at a loss for words: mark the day in red — she laughed, and said the frost had got my tongue, and that it must be quite the last of it.

The aunt has struck her colours, upon terms: we are to be married quietly, from her house, as though quietness could unsay a scandal — let her have it; victors are gracious. The count has promised us his carriage and his cook. And my resignation, which I signed in bitterness, I have to-day read over in triumph: it is the same paper, Wilhelm, and it is a manumission. Rage at me if you must: I shall hear it as a man hears rain on the roof of an inn where he lies warm.` }
], choices: [
  { label: "June.", to: "E2", canon: false }
]},

"E2": { date: "16 June 1772", ord: 17720616, canon: false,
  ending: "THE ANSWER", endingId: "E2", parts: [
  { head: "JUNE 16, 1772.", text: `To-day, Wilhelm — and you will have remarked the date before my pen could underline it — to-day, one year gone since I first crossed a certain threshold and saw a girl in a white dress cutting bread for a swarm of children, and thought that heaven had emptied itself into a hunting-lodge — to-day I am married.

Heaven is not emptied, Wilhelm. That was my error, and I publish the retraction: heaven repeats itself. It is the most spendthrift of authors; it writes the same divine sentence into more books than the learned will ever count. Deep blue eyes, this time, and the north in her voice; and when she laughs, the crusader turns in his grave, and I forgive him — for I too know now what it is to be unable to lie still.

We were married at nine; the count's cook has done what the frost could not, and laid the whole company under his yoke; and at evening we walked, she and I, under the lindens of her aunt's garden — lindens here too, Wilhelm: the sentence repeats, I tell you — and I was so happy that I caught myself speaking of it in the old wild ruinous words, the whole overflowing dictionary I had believed was printed for grief only; and I found it serves for joy without the alteration of a syllable. She heard me out — she hears me out, Wilhelm; it is her first miracle, and I have ceased to expect the end of it — and then she said that I might keep the dictionary, so long as she kept the man.` },
  { flag: "WALTZ", text: `And if some evenings, when there is dancing somewhere in the town and a waltz comes over the gardens, I stand a moment at the dark window — what of it? A man may look once a year toward a country he has left. It is how he knows he has left it.` },
  { text: `Come at Michaelmas. Come sooner. I am to be found under my own pear-trees, translating nothing, grieving at nothing, shading my eyes against nothing but the sun. — W.` },
  { foot: true, text: `Here the correspondence ceases; happiness, unlike sorrow, keeps no journal. The editor, who has followed poor Werther by another road and to another end, gives this bundle of letters without commentary — save only to remark that the hand in the later pages grows rounder, and that no sheet is blotted.` }
], choices: []},

/* ==================== BRANCH — THE OFFICE ==================== */

"O1": { date: "April–May 1772 — the apology", ord: 17720401, canon: false, parts: [
  { head: "MAY 30, 1772.", text: `You have had no letter since March: set it to the account of my new science, which is silence. I have made my apology — yes, that too: I waited upon Madame S— and inquired after her health; and she was gracious, having gained everything, I being no longer anything. Nothing in the world costs so little as what has cost everything.

The ambassador and I deal admirably now. I have learned the particles, Wilhelm. I take up my papers, and where I had written a sentence with blood in it, I amend it into one with none; and he reads, and nods, and says: "It will do." It does.` },
  { flag: "BELLA", text: `Fräulein B— passed me on the promenade with her aunt, and bowed as one bows to a man one has heard is lately dead — a little afraid of the error either way.` },
  { text: `The count is civil to me still; but careful now, as a man is careful of a repaired glass.` }
], choices: [
  { label: "Summer in harness.", to: "O2", canon: false }
]},

"O2": { date: "July–September 1772 — advancement", ord: 17720903, canon: false, parts: [
  { head: "SEPTEMBER 3, 1772.", text: `The ambassador has his leave at last — gone to his estates and his gout; and I conduct the legation in his absence. I, Wilhelm. The minister writes that my despatches are models. They are: I take a young man's living sentence, and I improve it dead, and it will do. Yesterday I returned the new secretary's memorandum with the remark that one may always improve by a more appropriate particle — and heard my own voice as it went out of me, and it was his voice. I sat still a long while after the fellow had bowed himself out.

On my desk lies a sheet of Wahlheim drawings I had thought lost — geese, a plough, two lindens. There is a smell in old paper, Wilhelm. I record the fact; a chronicler records facts; toward evening the fact was strongest.` }
], choices: [
  { label: "Enough. Leave the papers as they lie; ride west by the morning post.",
    to: "N22", log: "3 September 1772 — you threw off the office and rode for Wahlheim (the book resumed you)." },
  { label: "The winter lists must be prepared, and someone must prepare them. Remain.", to: "O3", canon: false }
]},

"O3": { date: "October–November 1772 — fair copy", ord: 17721130, canon: false, parts: [
  { head: "NOVEMBER 30, 1772.", text: `The winter lists are prepared. I am confirmed in the conduct of the legation until Easter, with an intimation of more to follow. The count's assembly received me last Thursday — the same room. I looked at the floor by the window, where a man once stood whom the company whispered out of it; and I felt nothing that a gentleman may not feel in company.` },
  { flag: "BELLA", text: `Fräulein B— is betrothed: the Baron F—'s nephew; the pedigree is satisfied. I signed the register of congratulations in a fair hand. My hand is much remarked upon now.` },
  { text: `I dine on Sundays with the chancellor. My despatches will do. It occurs to me that I have not opened the portfolio since Michaelmas, and that I do not miss it. I set the fact down — a chronicler sets down facts — though I can no longer always tell which of them are wounds.` }
], choices: [
  { label: "December.", to: "E3", canon: false }
]},

"E3": { date: "23 December 1772", ord: 17721223, canon: false,
  ending: "THE PARTICLE", endingId: "E3", parts: [
  { head: "D—, DECEMBER 23, 1772. TO THE MINISTER.", text: `Excellency! In obedience to the rescript of the 15th instant, the undersigned has the honour to report: that the winter lists are closed; that the accounts of the legation have been examined and found exact; and that the correspondence of the quarter is answered, registered, and filed. Nothing further has occurred that requires to be brought to your Excellency's notice.

The undersigned permits himself, with the season, the expression of his most dutiful respect, and remains, with perfect exactitude, your Excellency's most obedient servant.` },
  { text: `— postscriptum, in another ink: It snowed to-day past the window the whole forenoon; and the snow put me in mind of something which I could not afterward recover.` },
  { foot: true, text: `On this same night, in another December, a neighbour saw a flash, and heard a report. Here, nothing has occurred that requires to be brought to anyone's notice.` }
], choices: []},

/* ==================== BRANCH — THE MINES ==================== */

"M1": { date: "July–August 1772 — under the earth", ord: 17720808, canon: false, parts: [
  { head: "AUGUST 8, 1772.", text: `From under the earth, Wilhelm — the mines at last. I have been down. One goes in at the hillside as through a needle's eye, stooping behind a lamp; the mountain over one's neck like a held breath; and down, by ladders whose rungs are polished with three generations of hands, into galleries where the water ticks like a house-clock, and the dark is not the night's dark — the night's is a spent dark; this one is whole. The miners sing at the shift-bell. There is no weather down there. I had promised myself that this would be a mercy, my furies being mostly weather; and I report to you faithfully: it is not a mercy, it is only an absence.

They gave me the leather and the lamp a second week. I drew the wheel-house and the great pump, and the master swore no draughtsman had done them truer. And on the third evening, lying on the grass of the hill with the green after-image of sunset swimming upon the dark, I caught myself measuring — on the packthread of the heart, which never lies and never learns — the distance from that gallery's end to a certain valley. Sixty leagues, as the roads go. The thread ran straight through the mountain.

I am coming up, Wilhelm. Not out — up.` }
], choices: [
  { label: "September, and the valley.", to: "N21", canon: true }
]},

/* ==================== BRANCH — THE RIDE ==================== */

"R1": { date: "8–11 December 1772 — the ride", ord: 17721211, canon: false, parts: [
  { head: "DECEMBER 11, 1772.", text: `Two nights on the roads, Wilhelm, the frost like a wolf at the horse's chest; I write from the second inn, my hand still stupid with cold; and I must set it down to-night, for it is the one thing I have done in this year of my ruin that I would have you keep.

I rode to the one door in this world that has never been shut against me. There was company; there were lights; I stood in the hall in my road-dirt like the messenger in a tragedy, and was ashamed, and gave my name. And he came out to me, Wilhelm — came out from his guests, and heard me in his little cabinet, to the end. To the end! No man has heard me to the end since you. I pleaded the wretch's whole case: the service, the love, the brother's greed; that his crime was grown in the same ground where his fidelity grew, and by the same husbandry; and that the law which cannot see this may bind men's hands, but must not be suffered to shut men's mouths. When I had done, he sat a while with his ring against his teeth, and then said: "The wheel is not for this poor devil. I will write to-night; and you shall carry a second letter yourself in the morning, for speed's sake."

The sentence will be commuted; the man will live. Live! — a fortress, a wall, bread, and years: I know what I have begged for him, and I do not repent a syllable of it. Life is life; the sun climbs even a fortress wall. And despair — I am learned in despair, Wilhelm, as you know — despair is not the truth: it is only the dark, told over as though it were the whole of the astronomy.

I ride home to-morrow by the gallows-road, and shall look up at the thing as one looks at a beaten enemy.` }
], choices: [
  { label: "Christmas Eve, on the road out of the valley.", to: "E4", canon: false }
]},

"E4": { date: "24 December 1772", ord: 17721224, canon: false,
  ending: "THE PARDON", endingId: "E4", parts: [
  { head: "DECEMBER 24, 1772.", text: `It is done, Wilhelm. I carried the letter myself to the president of the court, and stood by while the seals were verified; and at noon to-day I was suffered to see the prisoner, to tell him. He heard it standing, his cap in his two hands, and said nothing a long while; and then — not to me; to the window — "So no one will marry her after all." God forgive me that my eyes ran over at that; for I understood him to the bottom, as one bell understands another. "You are saved, unfortunate man," I said to him at the grating — and could not say the rest of it. Whether we are saved, I know not.

It is Christmas Eve. I passed the hunting-lodge at dusk, going out of the valley: there were candles in every window, and the shadows of the children went across the blinds like a play of hands; and one taper, set apart upon a sill, may have been for anyone. The road does not stop the horse for such questions. I did not stop the horse.

I have my friend's word of a place in the spring, if I will have it; the world, he says, is wide. He is wrong, Wilhelm: the world is narrow — narrow as a gallery in a mine; and the one wisdom is to keep the lamp fed. But it goes forward. That much of the astronomy I have now verified with my own instruments.

Kiss my mother's hand for me. Expect me when you see me — and you will see me. — W.` }
], choices: []},

/* ==================== BRANCH — CHRISTMAS EVE ==================== */

"H1": { date: "24 December 1772 — among the children", ord: 17721224, canon: false, parts: [
  { head: "DECEMBER 24, 1772.", text: `I have been, Wilhelm, and am come home sober; the candle stands quiet; and I write it down before the warmth goes.

Three days I did not go to her — you know what that cost; enter it in your ledger against all my old extravagance. And this evening, Christmas Eve, I went. The room, when the door opened, was all one gold: the tree with its wax-lights, apples, and gilded nuts; the children not breathing, for glory; her father in the great chair; Albert at the table with the almonds, and the good grave face of a man in his own house — and I gave him my hand first, Wilhelm; first, and steadily. Then the little ones were over me like a stream over a stone. Sophy has made me a pen-wiper; the youngest would show me that the wax angels' wings are of real gold, which I confirmed upon my honour.

And she — she gave me my gift before them all, as one gives to a brother of the house: a book-mark of her own working, in silk, for my Homer — "for the old one," she said, "that travels" — and her eyes rested on me a moment, quiet, without any question in them at all. And that questionless look, Wilhelm, which a year ago would have been my death-warrant, I found — I write it slowly — I found that it could be lived under; as one lives under a low roof: stooping a little, and warm.

I behaved well. It can be done. It is done every day, by thousands; I have joined, at the eleventh hour, the great modest guild. To-morrow the goose, and the vicar's endless grace, and the children's new sled if the snow serves. I am expected. Mark that word, you chronicler of my storms, in the calendar of permitted days: I am expected.` }
], choices: [
  { label: "The new year.", to: "E5", canon: false }
]},

"E5": { date: "1 January 1773", ord: 17730101, canon: false,
  ending: "THE CHRISTMAS GIFT", endingId: "E5", parts: [
  { head: "JANUARY 1, 1773.", text: `This morning early, before I was well dressed, the judge's man brought over a paper, folded large, sealed with half a wafer, my name upon it in a stumbling grand hand a full inch high. The elder boys have written their New-Year's wishes, Wilhelm, as their mother taught them while she lived: one for papa; one for Albert and Charlotte; and one — one for Werther.

It lies before me on the desk: goodness and long life, in a text-hand, with the W turned handsomely, and a flight of birds over the whole — Sophy's, I think, the birds — going all one way, like the last line of a song. I have read it more times than I shall confess; and I have hung it over my desk, where the profile used to hang. The wall is better furnished now.

What am I, then, at the year's turning? The friend of the house. The clock of the house, wound regularly — the words were bitter once; I set them down now as a man sets down his income: soberly, knowing to a groschen what it is, and what it is not. There are lamps, Wilhelm, trimmed short, that burn the whole night through; that is the economy I have entered upon, and I keep its books strictly.

She is happy: I can no longer persuade myself otherwise; and at the year's turning a man should retire the lies he can no longer afford. Albert is my friend; the children are my calendar; the dark eyes rest upon me quiet, and questionless, and kind. From under this low warm roof I wish you, out of a whole heart — and it is whole, Wilhelm: mended is whole, ask any potter — a good new year. — W.` }
], choices: []},

/* ==================== ENDING — THE FLOOD ==================== */

"E6": { date: "12 December 1772", ord: 17721212, canon: false, voice: "editor",
  ending: "THE FLOOD", endingId: "E6", parts: [
  { text: `With the letter of the twelfth of December the correspondence of our friend breaks off; and what must be added, no diligence of ours has sufficed to establish beyond conjecture. We give the little we have as we found it.

On that night the vale of Wahlheim stood under water: the river had broken its banks before the thaw-wind, and where the meadows had been was a storming sea. That Werther went out toward eleven is certain, for the guards at the town gate knew him, and let him pass in silence. His hat was found next morning upon the point of a rock which overhangs the valley; how he should have climbed to it, on such a night, without falling, is not to be conceived: the flood ran directly beneath.

The body was given back by the water three days after, below the weir at M—. The papers in his room were found in order; the accounts paid; a packet lay sealed and directed to his friend, of which we have made use. Among the leaves of his Ossian was a slip, without date: "One lifts up the curtain, and passes to the other side — that is all."

Charlotte was long ill. Albert has never spoken of the matter. Whether he — but we have promised the reader conjecture only where we could not have certainty; and here we choose to have neither. The grave is by the churchyard wall at Wahlheim, under two lindens, and bears no name; the peasants, who loved him, keep it swept notwithstanding.

And thou, good soul, that feelest the same stress as he — let this little book be thy friend at the fireside; and take it no farther.` }
], choices: []}
