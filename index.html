  { text: `It is done, Wilhelm. I carried the letter myself to the president of the court, and stood by while the seals were verified; and at noon to-day I was suffered to see the prisoner, to tell him. He heard it standing, his cap in his two hands, and said nothing a long while; and then — not to me; to the window — "So no one will marry her after all." God forgive me that my eyes ran over at that; for I understood him to the bottom, as one bell understands another. "You are saved, unfortunate man," I said to him at the grating — and could not say the rest of it. Whether we are saved, I know not.

It is Christmas Eve. I passed the hunting-lodge at dusk, going out of the valley: candles in every window, the shadows of the children going across the blinds like a play of hands; and one taper, set apart upon a sill, may have been for anyone. The road does not stop the horse for such questions. I did not stop the horse.

I have my friend's word of a place in the spring, if I will have it; the world, he says, is wide. He is wrong, Wilhelm: the world is narrow — narrow as a gallery in a mine; and the one wisdom is to keep the lamp fed. But it goes forward. That much of the astronomy I have verified with my own instruments.

Kiss my mother's hand for me. Expect me when you see me — and you will see me. — W.` }
], choices: []},

/* ==================== BRANCH — CHRISTMAS EVE ==================== */

"H1": { date: "24 December 1772 — among the children", ord: 17721224, canon: false, voice: "letter", parts: [
  { head: "DECEMBER 24, 1772.", text: `I have been, Wilhelm, and am come home sober; and I write it down before the warmth goes.

Three days I did not go to Charlotte — you know what that cost. This evening I went. The room was all one gold: the tree, the wax-lights, the children not breathing; Albert at the table with the almonds — and I gave him my hand first, Wilhelm; first, and steadily.

She gave me my gift before them all, as to a brother of the house: a book-mark of her own working, for my Homer — "for the old one, that travels" — and her eyes rested on me, quiet, without any question in them. That questionless look, once my death-warrant, can be lived under — as one lives under a low roof: stooping a little, and warm.

I behaved well. It can be done. It is done every day, by thousands.` }
], choices: [
  { label: "Give the children the whole of Christmas Day besides. You are expected.", to: "E5", mark: "aXMAS" },
  { label: "Walk home the long way, past the drowned meadows, and feel nothing pull.", to: "E5", mark: "aMEADOW" }
]},

"E5": { date: "1 January 1773", ord: 17730101, canon: false,
  ending: "THE CHRISTMAS GIFT", endingId: "E5", voice: "letter", parts: [
  { head: "JANUARY 1, 1773.", text: `` },
  { mark: "aXMAS", text: `Christmas Day was the children's entire, as promised: the goose, the endless grace, the new sled.` },
  { mark: "aMEADOW", text: `I walked home that night the long way, Wilhelm, past the drowned meadows, and felt nothing pull. Set that down in gold.` },
  { text: `This morning early the judge's man brought over a paper, folded large, sealed with half a wafer, my name upon it in a stumbling grand hand a full inch high. The elder boys have written their New-Year's wishes, as their mother taught them while she lived: one for papa; one for Albert and Charlotte; and one — one for Werther.

It lies before me: goodness and long life, in a text-hand, with the W turned handsomely, and a flight of birds over the whole — Sophy's, I think, the birds — going all one way, like the last line of a song. I have hung it over my desk, where Charlotte's profile used to hang. The wall is better furnished now.

What am I, then, at the year's turning? The friend of the house. The clock of the house, wound regularly — the words were bitter once; I set them down now as a man sets down his income: soberly, knowing to a groschen what it is, and what it is not. There are lamps, trimmed short, that burn the whole night through; that is the economy I have entered upon, and I keep its books strictly.

She is happy: I can no longer persuade myself otherwise; and at the year's turning a man should retire the lies he can no longer afford. From under this low warm roof I wish you, out of a whole heart — and it is whole, Wilhelm: mended is whole, ask any potter — a good new year. — W.` }
], choices: []},

/* ==================== ENDING — THE FLOOD ==================== */

"E6": { date: "12 December 1772", ord: 17721212, canon: false, editorhead: true,
  ending: "THE FLOOD", endingId: "E6", parts: [
  { text: `With the letter of the twelfth of December the correspondence of our friend breaks off; and what must be added, no diligence of ours has sufficed to establish beyond conjecture. We give the little we have as we found it.

On that night the vale of Wahlheim stood under water. That Werther went out toward eleven is certain, for the guards at the town gate knew him, and let him pass in silence. His hat was found next morning upon the point of a rock which overhangs the valley; how he should have climbed to it, on such a night, without falling, is not to be conceived: the flood ran directly beneath.

The body was given back by the water three days after, below the weir at M—. The papers in his room were in order; the accounts paid; a packet lay sealed and directed to his friend, of which we have made use. Among the leaves of his Ossian was a slip, without date: "One lifts up the curtain, and passes to the other side — that is all."

Charlotte was long ill. Albert has never spoken of the matter. The grave is by the churchyard wall at Wahlheim, under two lindens, and bears no name; the peasants, who loved him, keep it swept notwithstanding.

And thou, good soul, that feelest the same stress as he — let this little book be thy friend at the fireside; and take it no farther.` }
], choices: []},

/* ============== ESCAPE CORRIDOR — THE GALLERY (mines) ============== */

"G1": { date: "September 1772 — the contract", ord: 17720920, canon: false, parts: [
  { head: "SEPTEMBER 1772.", text: `The Master of the mines, having seen the wheel-house drawings, offered what no one had thought to offer Werther: work. A winter's contract — the new galleries to be taken up on paper; chains and compass below, pen above; lodging with the bell-founder's household; the leather and the lamp his own. He did not go up to Wahlheim.

To Wilhelm, three lines: "I have hired out my one talent to the dark. Do not tell my mother it is the happiest sentence I have written this year."` }
], choices: [
  { label: "Sign for the winter.", to: "G2", mark: "aSIGN" },
  { label: "Sign for the winter — but keep a horse, in case.", to: "G2", mark: "aHORSE" }
]},

"G2": { date: "November 1772", ord: 17721101, canon: false, parts: [
  { head: "NOVEMBER 1772.", text: `` },
  { mark: "aSIGN", text: `He signed, and the winter began.` },
  { mark: "aHORSE", text: `He signed — and kept a horse at the bell-founder's, which ate its head off, unridden.` },
  { text: `From the winter we have working papers and two letters. The letters are calm — calmer than any since the spring of 1771. "There is no weather below, Wilhelm; I have told you it is an absence. I begin to think a man can furnish an absence. One measures; the chain does not exaggerate; at evening the line on the paper is exactly as long as the day was. Find me another trade of which that is true."` }
], choices: [
  { label: "Measure; draw; sleep.", to: "G3", mark: "aMEAS" },
  { label: "Keep the little Homer in the tool-chest, under the chalks.", to: "G3", mem: "TOOLCHEST", mark: "aCHESTA" }
]},

"G3": { date: "24 December 1772", ord: 17721224, canon: false, parts: [
  { head: "DECEMBER 24, 1772.", text: `` },
  { mark: "aMEAS", text: `He measured, drew, slept.` },
  { mark: "aCHESTA", text: `The little Homer lay under the chalks now, and went down with him daily.` },
  { text: `Of that Christmas one line is preserved: "They sang below at midnight, the whole shift, and set candles in the gallery wall; and I thought of no one, Wilhelm — which, thou wilt understand, is a manner of thinking of one person only."` }
], choices: [
  { label: "Set your own candle in the wall.", to: "G4", mark: "aCAND" },
  { label: "Go up, and stand an hour under the stars.", to: "G4", mark: "aSTARS" }
]},

"G4": { date: "March 1773 — the water", ord: 17730315, canon: false, parts: [
  { head: "MARCH 1773.", text: `` },
  { mark: "aCAND", text: `His candle stood in the gallery wall with the others.` },
  { mark: "aSTARS", text: `He had stood his hour under the stars, and gone down again before the bells.` },
  { text: `Here the letters fail, and we are on the pay-book's ground. In March the spring water broke into the second gallery. The book shows double wages that quarter; an entry for seven men's lamps, re-issued; and a silver tankard, inscribed to "the surveyor W., by whose plan of the old workings seven came up alive." Of his own account of that week we have nothing.` },
  { head: "· · ·", text: `` }
], choices: [
  { label: "Say nothing of it to Wilhelm.", to: "G5", mark: "aQUIETG" },
  { label: "Send Wilhelm the newspaper paragraph, without comment.", to: "G5", mark: "aPAPER" }
]},

"G5": { date: "1774", ord: 17740601, canon: false, parts: [
  { head: "1774.", text: `` },
  { mark: "aQUIETG", text: `Of the water-week Wilhelm got nothing.` },
  { mark: "aPAPER", text: `Wilhelm got the newspaper paragraph, without one word of Werther's own beneath it.` },
  { text: `Of the year 1774 the archive holds a bill for Dutch paper, and one line in the Master's hand: "W. below, at the great plan."` }
], choices: [
  { label: "Below, at the great plan.", to: "E7" },
  { label: "Below.", to: "E7" }
]},

"E7": { date: "1775", ord: 17750101, canon: false, editorhead: true,
  ending: "THE GALLERY", endingId: "E7", parts: [
  { text: `In 1775 the mountain was published: the whole mountain, every level and winding of a hundred and forty years of workings, engraved on copper at Leipzig, four sheets, initialed at the corner W. Those who know the plan say a man might find his way by it, in the perfect dark, from any gallery to any other; and that no such map had been made of any mountain before.` },
  { mem: "TOOLCHEST", notMem: "DRAWER", text: `An inventory of the survey-chest, taken years later, lists chalks, chains, a lamp of the old pattern — and a Homer in duodecimo, much worn, with a pink ribbon folded flat at the middle of the Odyssey.` },
  { mem: ["TOOLCHEST","DRAWER"], text: `An inventory of the survey-chest, taken years later, lists chalks, chains, a lamp of the old pattern — and a Homer in duodecimo, much worn. The ribbon it once travelled with had been left, turned under a key, in another country.` },
  { text: `Whether he is below it still, the archive does not say. The letters to Wilhelm had ceased by then — or have not reached us; we are no longer in a position to distinguish.` }
], choices: []},

/* ============== ESCAPE CORRIDOR — THE NORTH (Petersburg) ============== */

"P1": { date: "July 1772 — the commission", ord: 17720720, canon: false, parts: [
  { head: "JULY 1772.", text: `The Count's answer came by return of post, and was characteristic: no condolence, one commission. A legation was going to Petersburg in the autumn; a man was wanted who could keep papers in order and take views of what he saw; the salary was named, the road was named. "Bring the portfolio," the letter ended; "the north has never been drawn by anyone with a heart."

Werther read it twice — "once with terror, and once, Wilhelm, with something I have not felt since Wahlheim: appetite."` }
], choices: [
  { label: "Pack the portfolio; buy furs at Leipzig.", to: "P2", mark: "aFURS" },
  { label: "Write one last letter to Charlotte before the frontier.", to: "P2", mem: "LASTLETTER", mark: "aLASTLA" }
]},

"P2": { date: "September 1772 — Riga", ord: 17720915, canon: false, parts: [
  { head: "SEPTEMBER 1772. RIGA.", text: `` },
  { mark: "aFURS", text: `The furs were bought at Leipzig, and laughed at until Riga.` },
  { mark: "aLASTLA", text: `The letter to Charlotte was written before the frontier — and went, sealed, to the bottom of the trunk instead of the post.` },
  { text: `From the road east we have a page on the birch forests, and this: "To-day, past noon, the sea. I had it from books, like everything; and like everything it is not what the books said. It does not rage, Wilhelm — it works; it is the diligentest grey workman I ever saw. I sat on a bollard three hours and drew nothing. Some things are for the eye alone, which is a lesson twenty-two years overdue."` }
], choices: [
  { label: "Draw nothing; look.", to: "P3", mark: "aLOOK" },
  { label: "Draw it anyway, badly, and keep the sheet as a cure for vanity.", to: "P3", mem: "BADSEA", mark: "aBADSA" }
]},

"P3": { date: "December 1772 — Petersburg", ord: 17721215, canon: false, parts: [
  { head: "DECEMBER 1772. PETERSBURG.", text: `` },
  { mark: "aLOOK", text: `He drew no sea; he looked his three hours, and carried it inland whole.` },
  { mark: "aBADSA", text: `The failed sheet travelled with him, marked in his own hand: the sea — failed.` },
  { text: `The Neva froze in November. Of the capital Werther's letters give sledges, ice-hills, the palace like a cliff of shells; and this: no one there had heard of a certain assembly at D— — "I searched their faces for it a month, Wilhelm, and have given over." On the twenty-first of December he skated with the legation children on the river till dark, and came in "glowing, with a hunger I did not examine."` }
], choices: [
  { label: "Skate till dark.", to: "P4", mark: "aSKATE" },
  { label: "Teach the youngest to cut a W in the ice.", to: "P4", mark: "aWICE" }
]},

"P4": { date: "1773", ord: 17730601, canon: false, parts: [
  { head: "1773.", text: `` },
  { mark: "aSKATE", text: `He skated the Neva all that frost.` },
  { mark: "aWICE", text: `By Christmas the youngest of the legation children could cut a W in the ice, and signed the river with it everywhere.` },
  { text: `Of the following year we possess three letters and a bill of lading: colours, Dutch paper, a box of chalks by the Lübeck boat. From June: "The nights here forget to end. I sat drawing at midnight by daylight, and thought: this is the country for those to whom evening was always the enemy."` }
], choices: [
  { label: "Stay through the white nights.", to: "P5" },
  { label: "Stay.", to: "P5" }
]},

"P5": { date: "1774", ord: 17740301, canon: false, parts: [
  { head: "1774.", text: `There is in a private cabinet at Petersburg a small portrait in chalks, said to be by a German hand: a lady, not young, with a bird upon her finger. The attribution is doubtful; and the bird may be any bird.` }
], choices: [
  { label: "Any bird.", to: "E8" },
  { label: "A canary, perhaps.", to: "E8" }
]},

"E8": { date: "1775", ord: 17750601, canon: false, editorhead: true,
  ending: "THE NORTH", endingId: "E8", parts: [
  { text: `The trail ends at a signature: "W., master of drawing to the Academy," in the almanac of 1775; lodgings on the Vasilievsky Island; unmarried — which the entries of that country trouble to say.` },
  { mem: "BADSEA", text: `Among the sheets that came back with the chalks-bill is one marked, in his hand: "the sea — failed." It is the only failure in the box.` },
  { mem: "LASTLETTER", text: `And in the bundle from Riga there is one letter with a Wahlheim direction, sealed, never sent. We have not opened it. Some things are for the eye alone.` },
  { text: `Further we cannot follow. The papers this book was made from lie in a drawer in a south-German town; the man, if he lives, is thirty leagues of frost and a language beyond them.` }
], choices: []},

/* ============== ESCAPE CORRIDOR — THE PLAYERS (theatre) ============== */

"T1": { date: "June 1772 — the troupe", ord: 17720601, canon: false, parts: [
  { head: "JUNE 1772.", text: `The stage or two became the summer. The troupe was eleven persons, a wardrobe-basket, and a kingdom: the principal, Herr B—, governed it like a small elector, part tragedy-king and part horse-dealer. Werther painted them a forest, a prison, and a moon — "my first moon, Wilhelm, that anyone has needed" — and mended the prompt-books, being the only member whose hand could be read by candlelight.` }
], choices: [
  { label: "Paint what they need.", to: "T2", mark: "aPAINT" },
  { label: "Paint the forest with two lindens in it, for private reasons.", to: "T2", mem: "LINDENS", mark: "aLINDA" }
]},

"T2": { date: "September 1772", ord: 17720901, canon: false, parts: [
  { head: "SEPTEMBER 1772.", text: `` },
  { mark: "aPAINT", text: `He painted what they needed, and it served.` },
  { mark: "aLINDA", text: `Every forest he painted had two lindens in it; no one asked why. Not yet.` },
  { text: `By Michaelmas Werther prompted; by the fair he had parts — messengers, notaries, the friend of the lover. "I am become the man who brings the news, Wilhelm; the audience dreads me, and I have never been so welcome anywhere." Madame R—, who plays the queens and mends the stockings, took his measure in a week: his heart, she ruled, was questionably repaired and professionally promising.` },
  { flag: "WALTZ", text: `In the dance-scenes he would not waltz — some private law of his own, dating from a June night. The principal set it down to religion; Madame R— set it down correctly.` }
], choices: [
  { label: "Learn the friend of the lover; it is a part with a future.", to: "T3", mark: "aFRND" },
  { label: "Ask once for the lover, and be refused kindly.", to: "T3", mem: "ASKEDLOVER", mark: "aASKLA" }
]},

"T3": { date: "22 December 1772 — Emilia Galotti", ord: 17721222, canon: false, parts: [
  { head: "DECEMBER 22, 1772.", text: `` },
  { mark: "aFRND", text: `He learned the friend of the lover, and was applauded for it in three towns.` },
  { mark: "aASKLA", text: `He asked once for the lover; the principal refused him kindly, and it never rose again.` },
  { text: `On the twenty-second of December, in a residence-town, the troupe gave "Emilia Galotti" — Lessing's tragedy of an innocent destroyed. Werther prompted it: from the box beneath the boards he spoke every word of every part, half a breath before the players — the whole play once through, alone, under the stage. "A strange office, Wilhelm: to say all the passions a beat before they happen, softly, so that no one falls."` }
], choices: [
  { label: "Say the passions softly, a beat before they happen.", to: "T4", mark: "aSOFT" },
  { label: "Take the book home after, and read the last act twice.", to: "T4", mark: "aLACT" }
]},

"T4": { date: "1773", ord: 17730901, canon: false, parts: [
  { head: "1773.", text: `` },
  { mark: "aSOFT", text: `He said the passions softly, a beat before they happened, all that winter.` },
  { mark: "aLACT", text: `He took the play home that night, read the last act twice, and put it down.` },
  { text: `A playbill survives from the Michaelmas fair of 1773: "The Friend of the House, a comedy" — the Friend played by one Herr Wärther, the very phrase Charlotte's household had once fixed on him. The name is misspelt; the part, we are told, was applauded.` }
], choices: [
  { label: "The Friend of the House, nightly.", to: "E9" },
  { label: "Applauded.", to: "E9" }
]},

"E9": { date: "1774", ord: 17740401, canon: false, editorhead: true,
  ending: "THE PLAYERS", endingId: "E9", parts: [
  { text: `The last document is a letter of Madame R—'s, spring of 1774, to a third party: "Our painter-poet is well. He weeps nightly in the right places, and is paid for it; he has painted us a fourth forest."` },
  { mem: "LINDENS", text: `"The same two trees stand in all of them, and we have stopped asking."` },
  { mem: "ASKEDLOVER", text: `"He no longer asks for the lover."` },
  { text: `Of letters to Wilhelm after 1773 we have none. It may be they ceased; it may be that a man who speaks all the passions nightly, softly, a beat before they happen, has no further need of a correspondent.` }
