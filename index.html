<script id="game">
"use strict";
/* WERTHER — a state-graph adventure through the novel.
   Spine nodes N01–N31 follow Goethe (Boylan tr., condensed); branch nodes are invented.
   Flags: WALTZ, SCAR, BELLA, PATRON, HOMER (absent = Ossian). Marks live one node. */

const S = { node:null, flags:{}, marks:{}, mem:{}, canon:0, visited:{}, divs:[] };
const CANON_TOTAL = 31;

function has(f){ return !!S.flags[f]; }

function partVisible(pt){
  if (pt.flag && !has(pt.flag)) return false;
  if (pt.not && has(pt.not)) return false;
  if (pt.mark && !S.marks[pt.mark]) return false;
  if (pt.mem){ const ms = Array.isArray(pt.mem) ? pt.mem : [pt.mem]; if (ms.some(m => !S.mem[m])) return false; }
  if (pt.notMem && S.mem[pt.notMem]) return false;
  return true;
}

function esc(s){ return smart(s.replace(/&/g,"&amp;").replace(/</g,"&lt;")); }

function smart(s){
  return s
    .replace(/(^|[\s(—])"/g, "$1“")  /* opening double quotes */
    .replace(/"/g, "”")                     /* remaining are closing */
    .replace(/'/g, "’");                    /* apostrophes */
}

function paras(text){
  return text.split(/\n\s*\n/).map(p => p.trim()).filter(Boolean)
    .map(p => "<p>" + esc(p) + "</p>").join("");
}

function render(n){
  const el = document.getElementById("page");
  let h = "";
  if (n.titlepage){
    h += '<div class="titlepage">'
      + '<p class="sub small">a game of letters, after</p>'
      + "<h1>THE SORROWS OF<br>YOUNG WERTHER</h1>"
      + '<p class="sub small">by J. W. von Goethe &middot; in the translation of R. D. Boylan</p>'
      + '<hr class="rule">'
      + '<div class="editorhead" style="margin-bottom:.6rem">PREFACE.</div>'
      + "</div>";
  }
  else if (n.editorhead) h += '<div class="editorhead">THE EDITOR TO THE READER.</div>';
  h += '<div class="parts' + (n.voice === "editor" ? " editor" : "") + '">';
  for (const pt of n.parts){
    if (!partVisible(pt)) continue;
    if (pt.head) h += '<div class="datehead">' + esc(pt.head) + "</div>";
    if (pt.foot) h += '<div class="footnote">' + paras(pt.text) + "</div>";
    else h += paras(pt.text);
  }
  h += "</div>";
  if (n.ending){
    h += finis(n);
  } else if (n.choices && n.choices.length){
    h += '<div class="fleuron">&#10087;</div><div class="choices">';
    n.choices.forEach((c,i)=>{ h += '<button onclick="choose(' + i + ')">&mdash;&nbsp;' + esc(c.label) + "</button>"; });
    h += "</div>";
  }
  el.innerHTML = h;
  window.scrollTo(0,0);
  if (window.goatcounter && window.goatcounter.count)
    window.goatcounter.count({ path: "/werther/" + S.node, title: "Werther: " + S.node, event: true });
}

function verdict(n){
  switch(n.endingId){
    case "E1": return S.divs.length
      ? "You died on Goethe&rsquo;s schedule, though not for want of trying."
      : "You died on Goethe&rsquo;s schedule.";
    case "E2": {
      const first = S.divs.length ? S.divs[0].split(" — ")[0] : "the 16th of June 1771";
      return "You escaped the novel on " + esc(first) + ".";
    }
    case "E3": return "You left the story; the story did not notice.";
    case "E4": return "Goethe&rsquo;s December took a life; you gave one back.";
    case "E5": return "You remained within her orbit, and outside the book.";
    case "E6": return "You left Goethe&rsquo;s path and found the other death waiting.";
    case "E7": return "You went under the story, and it lost the sound of you.";
    case "E8": return "You escaped by the breadth of a continent; the archive ends at the frontier.";
    case "E9": return "You escaped into borrowed words, and no one could tell your voice from the play&rsquo;s.";
  }
  return "";
}

function finis(n){
  let h = '<div class="fin">';
  h += '<div class="finname">FINIS &middot; ' + esc(n.ending) + "</div>";
  h += '<p class="verdict">' + verdict(n) + "</p>";
  h += "<p>You kept to Goethe&rsquo;s page through " + S.canon + " of its one-and-thirty stations.</p>";
  if (S.divs.length){
    h += "<p>Where you left the path:</p><ul>";
    for (const d of S.divs) h += "<li>" + esc(d) + "</li>";
    h += "</ul>";
  } else {
    h += "<p>You never left the path.</p>";
  }
  h += '<div class="choices"><button onclick="restart()">&mdash;&nbsp;begin again&nbsp;&mdash;</button></div></div>';
  return h;
}

function enter(id){
  const n = NODES[id];
  if (!n) throw new Error("no node " + id);
  S.node = id;
  if (!S.visited[id]){ S.visited[id] = 1; if (n.canon) S.canon++; }
  if (n.setFlags) n.setFlags.forEach(f => S.flags[f] = 1);
  if (n.setMems) n.setMems.forEach(m => S.mem[m] = 1);
  if (typeof document !== "undefined") render(n);
  return n;
}

function resolveChoice(c){
  /* pure: returns {target, log, failMark} given current flags */
  if (c.gate){
    const ok = (c.gate.flag !== undefined) ? has(c.gate.flag) : !has(c.gate.flagAbsent);
    return { target: ok ? c.gate.pass : c.gate.fail,
             log: ok ? c.gate.passLog : c.gate.failLog,
             failMark: ok ? null : (c.gate.failMark || null) };
  }
  return { target: c.to, log: c.log || null, failMark: null };
}

function choose(i){
  const c = NODES[S.node].choices[i];
  S.marks = {};
  if (c.set) c.set.forEach(f => S.flags[f] = 1);
  if (c.mem) S.mem[c.mem] = 1;
  if (c.mems) c.mems.forEach(m => S.mem[m] = 1);
  const r = resolveChoice(c);
  if (c.mark) S.marks[c.mark] = 1;
  if (r.failMark) S.marks[r.failMark] = 1;
  if (r.log) S.divs.push(r.log);
  enter(r.target);
}

function restart(){
  S.node = null; S.flags = {}; S.marks = {}; S.mem = {}; S.canon = 0; S.visited = {}; S.divs = [];
  enter("START");
}

const NODES = {

/* ============================== TITLE ============================== */

"START": { date: "", ord: 0, canon: false, titlepage: true, parts: [
  { text: `I have carefully collected whatever I have been able to learn of the story of poor Werther, and here present it to you, knowing that you will thank me for it. To his spirit and character you cannot refuse your admiration and love: to his fate you will not deny your tears.

One thing more. The reader of a book follows; the reader of this one chooses. The days go only forward. One path through these papers is the path they took; whether they must go where they went before — that, good soul, is the question of the whole.` }
], choices: [
  { label: "Begin: the spring of 1771.", to: "N01", canon: true }
]},

/* ========================= BOOK I — SPINE ========================= */

"N01": { date: "May–June 1771", ord: 17710504, canon: true, parts: [
  { head: "MAY 1771.", text: `In the spring of 1771 a young man named Werther — a quick pencil, a pocket Homer, a heart in questionable repair — left his native town, a love-affair behind him, and found, a league out, the village of Wahlheim: two lindens before a church, an inn, a fountain. There he sat whole mornings over his Homer, dangerously content. "I treat my poor heart," he writes to Wilhelm — the friend at home, to whom all these letters went — "like a sick child."

He made two conquests: the children of the place, and a peasant-lad desperately in love with the widow he serves. The lad's confession worked on him strangely: "my own heart, as though enkindled by the flame, glows and burns within me."

For midsummer the young people had got up a ball; on the way a cousin was to be taken up: the district judge's daughter, one Charlotte S—.` }
], choices: [
  { label: "Let the widow be: better the lad's picture of her than your own eyes. To the ball.", to: "N04", canon: true, mark: "aLETBE" },
  { label: "Walk out with the lad one evening first, and see this widow of his for yourself.",
    to: "W1", log: "June 1771 — you went to see the widow with your own eyes, which Goethe's Werther refused himself." },
  { label: "Neither — the heart ferments sufficiently of itself. Homer and the fountain until the day of the ball.", to: "N04", mark: "aHOMERF" }
]},

"W1": { date: "June 1771 — the widow's farm", ord: 17710610, canon: false, parts: [
  { head: "JUNE 1771.", text: `Werther walked out with the lad one evening, as asked. The farm lay above the village, in good order. The widow was no beauty of the town sort: a strong, quiet, much-tried face; she gave them milk under the pear-tree, and spoke to the lad as one speaks to a good tool one is fond of. Werther saw what he had come to see, and one thing more: the brother, over from the mill on some errand of inheritance, stood in the doorway the whole visit and counted the cups.

"I understood then," he writes, "that the poor fellow's paradise has a landlord."` }
], choices: [
  { label: "Commend the lad to his mistress, there before the brother — a stranger's word may do what a servant's cannot.", to: "N04", mem: "LADWORD", mark: "aLADW" },
  { label: "Say nothing. Drink the milk she offers, and carry the picture home unbroken.", to: "N04", mem: "WIDOWSEEN", mark: "aWSEEN" }

"N04": { date: "16 June 1771 — the ball", ord: 17710616, canon: true, parts: [

  { mark: "aLETBE", text: `Werther let the widow be, as he had resolved; the lad kept his picture whole; and midsummer came.` },

  { text: `To the ball Werther drove with a partner of convenience — an unremarkable girl — and her aunt. On the way they were to take up a cousin at a hunting-lodge; and in the carriage the aunt gave warning like an oracle: the cousin was already engaged, to a very worthy man, away on business. The warning possessed, Werther says, no interest for him.

Then the hall of the lodge: six children about a girl in simple white with pink ribbons, cutting bread and giving each child its slice in proportion to age and appetite. This was the cousin, Charlotte. Werther handed her into the carriage a lost man.

At the ball a lady twice, smiling, pronounced the name Albert at her. "Albert," said Charlotte, "is a worthy man, to whom I am as good as engaged." The waltzes were forming; custom kept each dancer to his own partner; and Charlotte was fond of waltzing.` }

"N05": { date: "16 June 1771 — the storm", ord: 17710616, canon: true, voice: "letter", parts: [
  { mark: "aASKED2", text: `She answered him in the turning, lightly: promised these two years, to a worthy man of her dead mother's choosing; and the waltz went on.` },
  { text: `Of what followed, Werther's own letter must speak: —` },
  { head: "JUNE 16, TOWARD MORNING.", text: `Never did I dance more lightly. I felt myself more than mortal, holding the loveliest of creatures in my arms, flying with her as rapidly as the wind till I lost sight of every other object.

The storm we had watched in the horizon broke at last over the music. She gathered the frightened company into a round game, and their fears went out like candles; and when it was over we went to the window. It was still thundering at a distance: a soft rain was pouring down over the country, and filled the air around us with delicious odours. She stood leaning on her elbow, her eyes wandering over the scene; she raised them to the sky, and then turned them upon me; they were moistened with tears; she placed her hand on mine and said — "Klopstock!" She meant the poet, Wilhelm, and his great ode on the thunderstorm; I understood her at once, and sank under the weight of my sensations. I bent over her hand and kissed it in a stream of the most delicious tears. Divine Klopstock! why didst thou not see thy apotheosis in those eyes?` }

  { head: "JULY 1771.", text: `Werther went up with Charlotte on the Thursday. The vicarage of S—: an old man restored to life by the sight of her; two walnut-trees with a history; bread and milk in the court; and the vicar's daughter Frederica — a lively, good-humoured brunette, quite competent to amuse one in the country — with her suitor, Herr Schmidt, a polite personage whose silence was not want of talent but ill-humour. Charlotte was fetched home early to her father; Werther, pressed to stay, stayed until Sunday. At the supper-table he preached against ill-humour till Frederica's eyes shone and Schmidt's face went black. "We preach against a great many crimes," he writes; "I never remember a sermon delivered against ill-humour."` }
], choices: [
  { label: "Amuse Frederica the whole of Saturday. Schmidt may glower: ill-humour is a crime.", to: "N06", mem: "FREDERICA", mark: "aFREDA" },
  { label: "Keep to the old man; hear out the history of the younger walnut-tree, planted the morning his wife was born.", to: "N06", mem: "TREES", mark: "aTREEA" }

"N07": { date: "30 July 1771 — Albert", ord: 17710730, canon: true, parts: [

"N08": { date: "12 August 1771 — the pistols", ord: 17710812, canon: true, voice: "letter", parts: [
  { mark: "aWARMA", text: `The friendship took: walks, confidences, Charlotte between them like a book held open.` },
  { mark: "aCOOLA", text: `They settled into a correct, cool esteem, each elsewhere when the other called.` },
  { mark: "aLEDG", text: `Werther watched the man for the flaw; the ledger stayed empty, which was its own kind of entry.` },
  { text: `In mid-August Werther borrowed Albert's pistols for a walking-tour in the mountains. What passed over them he set down at length; and we give it whole, for everything after hangs from it.` },
  { head: "AUGUST 12.", text: `Certainly Albert is the best fellow in the world. As I was walking up and down his room, my eye fell upon his pistols. "Lend me those pistols," said I, "for my journey." He was telling how caution had once cost him dear — a servant, a ramrod left in the barrel, a maid's shattered thumb — and I had ceased to listen; and with a sudden motion I pointed the mouth of the pistol to my forehead, over the right eye. "What do you mean?" cried Albert, turning it aside. "It is not loaded," said I. "And even if not," he answered with impatience, "what can you mean? I cannot comprehend how a man can be so mad as to shoot himself: the bare idea shocks me."

We argued it the length of the afternoon — he with the sound sense of a man who means to keep the road, I with the whole of my heart. "The question," I said at last, "is not whether a man is strong or weak, but whether he is able to endure the measure of his sufferings. It is just as absurd to call a man a coward who destroys himself, as to call a man a coward who dies of a malignant fever." — "Paradox! all paradox!" cried Albert. We parted without conviction on either side. How rarely in this world do men understand each other!` }
], choices: [

"N09": { date: "August 1771", ord: 17710815, canon: true, parts: [
  { head: "AUGUST 1771.", text: `` },
  { mark: "aREST", text: `Werther let the dispute rest, took the pistols, and walked.` },
  { mark: "aFEV", text: `The argument went to Wilhelm written out fair, polished till it shone; then Werther took the pistols, and walked.` },
  { text: `The glorious summer turned in Werther's hands. The full heart that had brought all paradise before him now showed him, behind every leaf, the devouring: "the universe is to me a fearful monster, for ever devouring its own offspring." On his birthday, the twenty-eighth, came a packet from the two of them: a small Homer for his walks, and one of the pink ribbons Charlotte had worn the day he first saw her.` },
  { flag: "WALTZ", text: `The very knot his eyes had followed through the whole of that first waltz.` }
], choices: [
  { label: "Kiss the ribbon a thousand times.", to: "N10", canon: true, mark: "aKISS" },
  { label: "Lay ribbon and Homer in a drawer, and turn the key. What is consecrated, burns.", to: "N10", mem: "DRAWER", mark: "aDRW" }
]},

"N10": { date: "3 September 1771", ord: 17710903, canon: true, parts: [
  { head: "SEPTEMBER 3.", text: `` },
  { mark: "aKISS", text: `The ribbon lived in Werther's breast-pocket now.` },
  { mark: "aDRW", text: `Ribbon and Homer lay locked away; the key rode in Werther's pocket like a splinter.` },
  { mem: "UNANSWERED", text: `Wilhelm's second letter came the sharper for the unanswered first.` },
  { text: `Charlotte was gone to town for some weeks; Albert was always at her side; Wilhelm grew stern. And Werther wrote: "I must away. Thank you for determining my wavering purpose: I must away."` }
], choices: [
  { label: "Go — take the post at D— after all. Two hours of farewell to-night, and at sunrise the horses.", to: "N11", canon: true },
  { label: "Unpack the trunk. A man does not outride the sun by turning his horse west.",
    to: "ST1", log: "3 September 1771 — you refused to leave Wahlheim." }
]},

"N11": { date: "10 September 1771 — farewell", ord: 17710910, canon: true, parts: [
  { head: "SEPTEMBER 10.", text: `Werther's last evening was spent, all three together, on the terrace under the chestnut-trees, the moon rising behind the wooded hill. Charlotte spoke of her dead mother, and of the country behind death: "We shall live again, Werther — but shall we know one another again? What do you think? what do you say?"

"We shall see each other again," he said; "here, and hereafter." He kept, through two hours, the courage not to betray his intention. She never suspected it was a leave-taking.

They walked down the avenue; he stood and watched her white dress vanish by the garden gate; and at sunrise the horses were at the door.` }
], choices: [
  { label: "Betray nothing to Charlotte. Leave her the smiling to-morrow she wished you.", to: "N12", canon: true, mark: "aQUIETD" },
  { label: "Let one sentence slip — 'should I say for ever?' — and watch it pass Charlotte by.", to: "N12", mem: "HALFSAID", mark: "aHALF" }
]},

/* ========================= BOOK II — SPINE ========================= */

"N12": { date: "Winter 1771 at D—", ord: 17711020, canon: true, parts: [
  { head: "WINTER AT D—.", text: `` },
  { mark: "aQUIETD", text: `Werther was gone by sunrise, the secret kept whole.` },
  { mark: "aHALF", text: `The one sentence had slipped — should I say for ever? — and had passed her by unheard; by sunrise Werther was on the road.` },
  { mark: "aWALLW", text: `The wall of work went up, course by course, through the autumn.` },
  { mark: "aCOUS", text: `The first measured, cousinly letter went south in October, and read like a well-swept room.` },
  { text: `The embassy received Werther with its climate. The ambassador: a punctilious blockhead, never pleased because never pleased with himself, forever returning Werther's papers for the style of them: "they will do; but one may always improve by a better word, a more appropriate particle." The society: "brilliant wretchedness; the ambition of rank — how they watch, how they toil, to gain one step!" And the one compensation: the Count of C—, a large capacious mind with warmth in it, who perceived at the first word that they understood each other.` }
], choices: [
  { label: "Give the Count your evenings; he is the one mind here in sympathy with your own.", to: "N13", canon: true, mark: "aEVEN" },
  { label: "Work, only work: tire yourself into honest sleep, and let the society of D— play on without you.", to: "N13", mem: "DESKWORK" },
  { label: "Answer the ambassador's grammar aloud, for once, before the assembled clerks.", to: "N13", mem: "INSOLENT", mark: "aINSO" }
]},

"N13": { date: "January 1772", ord: 17720120, canon: true, parts: [
  { head: "JANUARY 1772.", text: `` },
  { mark: "aEVEN", text: `The evenings at Count C—'s became the pillar of Werther's week.` },
  { mark: "aINSO", text: `The scene before the clerks was a week's talk in the chancery, and the ambassador's pen grew no kinder.` },
  { mem: "DESKWORK", text: `The wall of work held until the snow came.` },
  { text: `From an inn in a snowstorm Werther wrote — to Charlotte herself, the one letter of that winter with blood in it: "I stand as before a raree-show; I see the little puppets move, and I ask whether it is not an optical illusion. I am myself one of them."` },
  { mem: "COUSINLY", text: `(It was not, as it happens, his first letter southward; he had kept his measured, cousinly page each month.)` },
  { text: `And at D— one being interested him: a Fräulein B—, blue-eyed, much-souled, her rank a torment to her, with whom he spoke whole evenings of rural happiness — and of Charlotte. Wilhelm asked, reasonably, what the lady was to him.` }
], choices: [
  { label: "Fräulein B— is a glass held toward the south: through her I look to Wahlheim. Write it so.", to: "N14", canon: true, mark: "aGLASS" },
  { label: "Or set the glass down, and see Fräulein B— herself: not Charlotte's likeness — a soul entire, and it inclines to me.",
    to: "N14", set: ["BELLA"], log: "8 February 1772 — you looked at Fräulein B— and saw her." }
]},

"N14": { date: "February 1772", ord: 17720217, canon: true, parts: [
  { head: "FEBRUARY 1772.", text: `` },
  { mark: "aGLASS", text: `He had written it so: a glass, nothing more. The winter believed him no better than we do.` },
  { text: `Two letters crossed Werther that month like two winds. First the minister's reprimand — gentle, and unbearable.` },
  { mem: "INSOLENT", text: `It cited, among other matter, a certain scene played before the assembled clerks.` },
  { text: `Then the news from Wahlheim: Albert and Charlotte were married. There had been no announcement to him; they had meant to spare him the day, and so gave it to him entire.` },
  { mem: "ALBERT", text: `"I thank you, Albert, for having deceived me. You are now united, and her picture still remains here. Well! let it remain. I hold the second place in her heart, and I mean to keep it. Farewell, Albert — farewell, angel of heaven — farewell, Charlotte!"` },
  { notMem: "ALBERT", text: `"So you are Albert," he writes — to a man he had never once met — "a name first; then a hand in a church register. I hold the second place in her heart, and I mean to keep it. Farewell, Albert, whom I do not know — farewell, angel of heaven — farewell, Charlotte!"` },
  { mem: "WARM", text: `To Wilhelm he added one line: that the deceit was Albert's first unkindness, and had been meant as a kindness, which was the worst of it.` }
], choices: [
  { label: "Let Charlotte's picture hang where it hangs.", to: "N15", canon: true, mark: "aHANG" },
  { label: "Take Charlotte's picture down at last; bury it among your papers, as the letter had vowed.", to: "N15", mem: "PICTUREDOWN", mark: "aPICT" }
]},

"N15": { date: "15–16 March 1772 — the assembly", ord: 17720315, canon: true, setFlags: ["SCAR"], parts: [
  { head: "MARCH 15–16.", text: `` },
  { mark: "aHANG", text: `The picture stayed on its nail.` },
  { mark: "aPICT", text: `The picture came down and went, wrapped, among his papers; the nail stayed in the wall.` },
  { text: `Count C— had Werther to dine, on an evening when the nobility assemble at his house. Werther, thinking of nothing, stayed too long. The noble company arrived — the S—s, the T—s — and the whisper went round the room, until the Count drew him to a window: "You know our ridiculous customs; the company is displeased to see you here." The Count pressed his hand in a manner that said everything; Werther stole away, and read in his Homer how Ulysses was the guest of the excellent swineherd.

By morning it was all over town. And Fräulein B—, met in the walk, wept: she had heard his condemnation the whole length of breakfast, and had not dared defend him. "A hundred times I have seized a knife, to give ease to this oppressed heart. They tell of a noble race of horses that, over-ridden, bite open a vein to breathe. So I."` }
], choices: [
  { label: "Tender your resignation to the court, and go. Pride is all that remains; carry it away whole.", to: "N16", canon: true },
  { label: "Endure it. Appear at the next assembly with a smooth face; make the apology; outlast them all.",
    to: "O1", log: "16 March 1772 — you pocketed the affront and remained in the service." },
  { label: "To Fräulein B—'s aunt this evening: ask for the lady's hand, and let the whole town whisper at once.",
    gate: { flag: "BELLA", pass: "L1", fail: "N16", failMark: "rebuffed",
      passLog: "16 March 1772 — you asked for Fräulein B—'s hand, and the novel lost you.",
      failLog: "16 March 1772 — you asked for Fräulein B—'s hand; she saw where your heart lay, and refused you." } }
]},

"N16": { date: "24 March – 19 April 1772", ord: 17720324, canon: true, parts: [
  { head: "MARCH 18.", mark: "rebuffed", text: `She received him alone, and wept, and was even: "You honour me, and you deceive yourself. I have watched your face when the talk was of a certain lady at Wahlheim. Go home, Werther." — Home! Which of his homes did she intend?` },
  { head: "MARCH 24 – APRIL 19.", text: `Werther's resignation went in; the court, with reluctance, granted it. The crown prince sent five-and-twenty ducats at parting; and an admirer of another kind — the Prince of ——, who liked his company — offered his hunting-estates for the spring.` }
], choices: [
  { label: "Depart without farewells. The Count pressed your hand at the window; let that suffice.", to: "N17", canon: true, mark: "aNOFARE" },
  { label: "Go first to Count C—: thank him, and leave one friendship standing whole behind you.",
    to: "N17", set: ["PATRON"], mark: "countfriend",
    log: "April 1772 — you went to Count C— and parted from him as a friend." }
]},

"N17": { date: "May 1772", ord: 17720505, canon: true, parts: [
  { mark: "countfriend", text: `The Count kept him to dinner on the last evening, and embraced him at parting: "The courts of this world will shut on you; you have a talent for it. When one does, knock at my door — it is not a court."` },
  { mark: "aNOFARE", text: `Werther left D— without farewells, as he had resolved.` },
  { head: "MAY 1772.", text: `On the road south Werther made pilgrimage to his native place: the great elm; the schoolroom become a shop; the stream where a boy had stood surmising the countries the water must pass through. "Man needs but little earth for enjoyment," he writes, "and still less for his final repose." By mid-May he was at the Prince's hunting-lodge — an honest, unaffected man, who valued Werther's talents more than his heart, which was his only pride.` }
], choices: [
  { label: "An hour under the old elm, and ride on.", to: "N18", canon: true, mark: "aELM" },
  { label: "Knock besides at the old house-door; ask to see the room where you were born.", to: "N18", mem: "OLDROOM", mark: "aROOM" }
]},

"N18": { date: "May–June 1772, at the Prince's", ord: 17720525, canon: true, parts: [
  { head: "MAY 25 – JUNE 11.", text: `` },
  { mark: "aELM", text: `The hour under the elm was taken; then the road again.` },
  { mark: "aROOM", text: `They had let him into the old house — the room he was born in is a linen-closet now. Werther said nothing for a mile after.` },
  { text: `One plan Werther had nursed in secret: to enter the army under the Prince, who is a general. The Prince talked him out of it in a single walk, with reasons it would have been madness not to hear. What remained was grace without ease: "There is nothing in common between us. His conversation entertains me no more than a well-written book. I shall remain a week longer, and then—" The sentence would not finish itself.` }
], choices: [
  { label: "Let the army scheme fall. Drift a week longer, then follow where the heart pulls — back toward Wahlheim.", to: "N19", canon: true, mark: "aDRIFT" },
  { label: "Give the Prince not your talents but your truth: tell him everything this evening — Charlotte, the assembly at Count C—'s, the whole map of your ruin.",
    to: "N19", set: ["PATRON"], mark: "candor",
    log: "June 1772 — you opened your heart to the Prince, and he became your friend." },
  { label: "Neither camp nor court: go down into the earth instead. The mines in —— want seeing.",
    to: "M1", log: "June 1772 — you went down into the mines instead of back." },
  { label: "Ask the world for employment — a legation, a survey, a library; anything, so it be far.",
    gate: { flag: "PATRON", pass: "P1", fail: "N19", failMark: "coldpost",
      passLog: "June 1772 — you asked a friend for distance, and he gave you the north.",
      failLog: "June 1772 — you wrote to the great world for employment; no answer found you on the roads." } }
]},

"N19": { date: "July 1772", ord: 17720716, canon: true, parts: [
  { mark: "candor", text: `The Prince heard him to the end, and at parting held both his hands: "You are wounded, not worthless. When the winter of the thing arrives, come to me. I mean it as a standing order."` },
  { mark: "coldpost", text: `The letters he had written for employment went unanswered. The wide world keeps no seat for a man who only wants distance.` },
  { mark: "aDRIFT", text: `He let the army scheme fall, and drifted the promised week.` },
  { mark: "aFAR", text: `He rode farther, by longer detours; and the detours, given time, bent home.` },
  { mark: "aADMIT", text: `He admitted the method at last: every road he took bent, given time, toward the one valley.` },
  { head: "JULY 1772.", text: `"Once more I am a wanderer, a pilgrim, through the world. But what else are you!" By late July Werther had ceased pretending the mines were his object.` }
], choices: [
  { label: "To Wahlheim, then: smile at the heart, and obey it.", to: "N20", canon: true, mark: "aOBEYW" },
  { label: "One detour more — a week at the falls — to prove the heart can wait.", to: "N20", mem: "DETOUR" }
]},

"N20": { date: "August 1772", ord: 17720804, canon: true, parts: [
  { head: "AUGUST 1772.", text: `` },
  { mark: "aOBEYW", text: `Werther turned the horse for Wahlheim, and looked at no other road.` },
  { mark: "aSTRICT", text: `The calendar of permitted days was kept strictly to the last.` },
  { mem: "DETOUR", text: `The extra week at the falls proved what delay always proves.` },
  { mem: "TUESDAY", text: `The broken Tuesday had cost him a week of Charlotte's coolness, and he counted it cheap.` },
  { text: `August brought a death: a peasant woman whose children Werther had petted through his first summer had lost her youngest, little John; her husband was back from Switzerland fevered and penniless. And at the lodge, everything and nothing was changed. "When I pass out at the same gate, along the same road that first carried me to Charlotte — all, all is altered! And sometimes, lost in dreaming, I say to myself: if Albert were to die? — and I run after the phantasm to the edge of a precipice, and shrink back trembling."` }
], choices: [
  { label: "To Charlotte's lodge the first evening.", to: "N21", canon: true, mark: "aFIRSTE" },
  { label: "Circle the lodge three days before knocking.", to: "N21", mem: "CIRCLED" }
]},

"N21": { date: "4 September 1772 — the lad again", ord: 17720904, canon: true, parts: [
  { head: "SEPTEMBER 4.", text: `` },
  { mark: "aFIRSTE", text: `Werther was at the lodge the first evening; the children still knew him.` },
  { mark: "aUPHOME", text: `Werther came up from the mines by the straight road, with September on the hills.` },
  { mark: "aWHEELA", text: `The wheel-house drawing went ahead to Wilhelm — proof the hand still serves — and its maker followed it out of the hills.` },
  { mem: "CIRCLED", text: `Three evenings he had watched the candles of the lodge from the hill before he could knock.` },
  { text: `The peasant-lad — he whose love for his widowed mistress had so kindled Werther in the first spring — was dismissed from her service. Werther met him on a road and had the whole story: the passion grown past governing; the chamber; the violence he could not remember and would not deny; the brother's triumph; and a new servant in his place, whom the widow, it was said for certain, would marry. The lad was firmly resolved not to live to see it.` },
  { mem: "WIDOWSEEN", text: `Werther saw again the strong, quiet face under the pear-tree, and the counted cups.` },
  { mem: "LADWORD", text: `The brother, meeting Werther on the road, touched his hat with an insolence that remembered the stranger who had meddled for a servant in June.` },
  { text: `"I read and re-read this history, Wilhelm: it is the history of your friend! And I am not half so brave, not half so determined, as that poor wretch, with whom I scarcely dare compare myself."` }
], choices: [
  { label: "Listen to the end, and carry the story home like a live coal.", to: "CAN", canon: true, mark: "aCOAL" },
  { label: "Go up to the brother once more, and speak for the man.", to: "CAN", mem: "LADWORD", mark: "aPLEADA" },
  { label: "Press money on the lad; beg him to enlist — the king's shilling, and another valley.", to: "CAN", mem: "SOLDIER", mark: "aSHILL" }
]},

"CAN": { date: "12 September 1772 — the canary", ord: 17720912, canon: true, parts: [
  { head: "SEPTEMBER 12.", text: `` },
  { mark: "aCOAL", text: `The lad's story came home with Werther like a live coal, and was told to no one.` },
  { mark: "aPLEADA", text: `The brother heard Werther out with a touch of the hat, and promised nothing.` },
  { mark: "aSHILL", text: `The lad took the money without looking at it, and promised nothing.` },
  { text: `Days later, at the lodge: Charlotte had a canary on her hand, a present for the children. "He shall kiss you too," she said — and the little beak began its journey from her lips toward Werther's.` }
], choices: [
  { label: "Take the bird's kiss.", to: "WAL", mem: "CANARY", canon: true },
  { label: "Turn your face away.", to: "C1", log: "12 September 1772 — you refused the bird's kiss." }
]},

"C1": { date: "13 September 1772", ord: 17720912, canon: false, parts: [
  { head: "SEPTEMBER 13.", text: `Charlotte put the bird by without a word, and spoke of the children's lessons. Next morning, meeting him on the Wahlheim road, she was gentle and far, like fine weather in another valley. Neither made the apology; each watched the other not make it. Of all the wounds of that autumn he counts this one strangest: "that a man may bleed from what he himself refused."` }
], choices: [
  { label: "Beg Charlotte's pardon next day, with a jest about the bird.", to: "WAL", mark: "aJEST" },
  { label: "Let it stand. A man must refuse something.", to: "WAL", mem: "REFUSED", mark: "aSTAND" }
]},

"WAL": { date: "15 September 1772 — the walnut-trees", ord: 17720915, canon: true, parts: [
  { head: "SEPTEMBER 15.", text: `` },
  { mem: "CANARY", text: `"She should not do it!" Werther writes of the bird's kiss. "She ought not to inflame my imagination with these pictures of heavenly innocence. And why not? — She trusts me so!"` },
  { mark: "aJEST", text: `The jest about the bird was made next day, and taken kindly, and mended little.` },
  { mark: "aSTAND", text: `The refusal stood. The air between them wore it like a small scar.` },
  { text: `That week, at S— in the mountains — where Charlotte had loved to visit the old vicar under his two great walnut-trees — the new vicar's wife had the trees felled: the falling leaves dirtied her yard, and the boys' stones at nut-time disturbed her meditations. The village murmured; Werther could, he said, have slain the man who struck the first stroke.` },
  { mem: "TREES", text: `The younger tree was of an age with the old vicar's dead wife. He had heard its history under its own shade.` },
  { mem: "FREDERICA", text: `Frederica, the vicar's daughter he had amused a whole Saturday once, was married into the next parish and gone.` }
], choices: [
  { label: "Rage to Wilhelm — 'I could run mad!' — and let it lie.", to: "N22", canon: true, mark: "aRAGE" },
  { label: "Rouse the village: a letter read aloud at the inn, and names named in it.",
    to: "WT1", log: "September 1772 — you raised the village over the walnut-trees." }
]},

"WT1": { date: "late September 1772 — the protest", ord: 17720916, canon: false, setMems: ["SCANDAL"], parts: [
  { head: "SEPTEMBER 1772.", text: `The letter was read at the inn to great effect. The parish murmured aloud a full week; the vicar's wife kept her rooms; the steward talked of law. Then the district judge — Charlotte's father — sent a friendly word across the valley: the trees were down and would stay down, and a stranger does a village no service by heating it. The murmur cooled, as murmurs do. Werther had made, without knowing it, his character in the district: a warm head — the officials said it warmly.` }
], choices: [
  { label: "Bow to the judge's word.", to: "N22", mark: "aBOW" },
  { label: "Answer the judge with Homer: what are laws to fallen shade?", to: "N22", mark: "aHOMANS" }
]},

"N22": { date: "12 October 1772", ord: 17721010, canon: true, parts: [
  { head: "OCTOBER 12.", text: `` },
  { mark: "aRAGE", text: `The rage went into a letter to Wilhelm, and the letter into the post; and the trees stayed down.` },
  { mark: "aBOW", text: `Werther bowed to the judge's word, and the village cooled around him.` },
  { mark: "aHOMANS", text: `His answer went back across the valley — what are laws to fallen shade? — and the judge did not reply.` },
  { mark: "aFIRSTL", text: `Werther went up to the lodge at first light, and was received kindly. Kindly was the whole of it.` },
  { mark: "aSTATIONS", text: `He came at Charlotte by the old stations — fountain, lindens, walk — arriving all morning long.` },
  { text: `Two books lay on Werther's table that autumn: the little Homer Charlotte had given him, and his own translation of Ossian — the melancholy northern songs of mist, tombs, and dead warriors. "Ossian has superseded Homer in my heart."` }
], choices: [
  { label: "Ossian. The mists, the tombs, the voices in the torrent — they know my case.", to: "N23", canon: true, mark: "aOSSA" },
  { label: "Homer. The hearth, the homecoming, the swineherd's fire: keep the old daylight, though it shame you.",
    to: "N23", set: ["HOMER"], mark: "aHOMB", log: "12 October 1772 — you kept to Homer against the mists." }
]},

"N23": { date: "October–November 1772", ord: 17721019, canon: true, parts: [
  { head: "OCTOBER — NOVEMBER.", text: `` },
  { mark: "aOSSA", text: `The Ossian rode in Werther's pocket now; the Homer stayed behind on the table.` },
  { mark: "aHOMB", text: `The little Homer rode in Werther's pocket now; the Ossian stayed behind on the table.` },
  { text: `From here the papers thicken, and our office thins: the letters must speak more, and we less.

"Alas! the void — the fearful void which I feel in my bosom! Sometimes I think, if I could only once — but once — press her to my heart, this dreadful void would be filled."` },
  { not: "HOMER", text: `"At evening the mist lies on the meadows and moves; and I persuade myself that it is peopled, and go out to walk among the great grey company."` },
  { flag: "HOMER", text: `"At evening I read of the swineherd's fire, and of the old dog that knew his master again after twenty years; and for an hour there is something like a roof over me."` },
  { text: `"Yesterday, when I took leave, Charlotte seized me by the hand and said, 'Adieu, dear Werther.' Dear Werther! It was the first time she ever called me dear: the sound sunk deep. I have repeated it a hundred times; and last night, going to bed, I suddenly said, 'Good night, dear Werther!' — and could not but laugh at myself."` }
], choices: [
  { label: "Go on as before: daily to Charlotte, and drink the sweet poison of it.", to: "N24", canon: true, mark: "aDAILY3" },
  { label: "Try Wilhelm's remedy: a fortnight of riding and cold water.", to: "N24", mem: "REMEDY" }
]},

"N24": { date: "24–30 November 1772", ord: 17721124, canon: true, parts: [
  { head: "NOVEMBER 24–30.", text: `` },
  { mark: "aDAILY3", text: `He went on as before — daily to the lodge, drinking it.` },
  { mem: "REMEDY", text: `The fortnight of riding ended at Charlotte's piano.` },
  { text: `Werther found Charlotte alone at the piano and made a vow over her lips — "never will I seek to profane your purity with a kiss" — and did not trust the vow a week.

By the river, in the last of November, he met a man in a mean green coat hunting flowers among the rocks — flowers in November, for his queen. The mother's account: a year raving, chained in the madhouse; six months quiet; once her good still son, with a fine clerk's hand. And the time the poor soul praised as his happiest was the madhouse time, when he knew nothing of himself. "God in heaven! is this the destiny of man — happy only before he has his reason, and after he has lost it?"` },
  { mem: "OLDROOM", text: `He thought, listening, of a room he had asked to see in the spring, and of a schoolroom become a shop.` }
], choices: [
  { label: "Press money into the mother's hand, and hasten away.", to: "N25", canon: true, mark: "aMONEY" },
  { label: "Walk with the flower-hunter among the rocks; help him look, in November.",
    to: "HM1", log: "30 November 1772 — you spent an afternoon helping a madman look for flowers." },
  { label: "Question the mother to the bottom: whence, and when, and why.", to: "N25", mem: "STORY" }
]},

"HM1": { date: "30 November 1772 — with Heinrich", ord: 17721130, canon: false, parts: [
  { head: "NOVEMBER 30, LATER.", text: `They hunted flowers together the length of the grey afternoon, among wet rocks — Heinrich, the mother called him — the madman well content with his companion and promising the centaury a place in the nosegay for his queen; Werther carrying, he confessed, the easier heart of the two. At the cottage door the mother told the history over again with her son's hand in hers, and would not weep before him, and wept.` }
], choices: [
  { label: "Lead Heinrich home, and say nothing of him at Charlotte's lodge.", to: "N25", mark: "aLEDH" },
  { label: "Bring Heinrich one day to Charlotte's gate — let him see the queen of somebody's flowers once.", to: "N25", mem: "QUEEN" }
]},

"N25": { date: "1–6 December 1772", ord: 17721204, canon: true, parts: [
  { head: "DECEMBER 1–6.", text: `` },
  { mark: "aMONEY", text: `Werther pressed money into the mother's hand, and got away almost at a run.` },
  { mark: "aLEDH", text: `Werther led Heinrich home to his mother's door, and said nothing of him at the lodge.` },
  { text: `Then Albert, calmly, supplied the history. The flower-hunter Heinrich had once been secretary to Charlotte's father; a passion for Charlotte, nourished, concealed, discovered, had cost him first his place and then his wits. The word went into Werther like winter water.` },
  { mem: "STORY", text: `Half of it he had already had from the mother; knowing had not armoured him.` },
  { mem: "QUEEN", text: `And he had led the man to her very gate. Charlotte had been gentle with him; and the gentleness was dreadful.` },
  { text: `Days later, at the piano, Charlotte fell into the old air, the heavenly air, the first of all their music. "For Heaven's sake," he broke out, "play that air no more!" She stopped, and looked at him steadily. "Werther, you are very ill: your dearest food is distasteful to you. Go, I entreat you — compose yourself." — "God! thou seest my torments, and wilt end them."` }
], choices: [
  { label: "Go home, as Charlotte bids.", to: "N26", canon: true, mark: "aGOHOME" },
  { label: "Stay the evening out; make yourself smile; fool nobody.", to: "N26", mem: "MASK", mark: "aMASKA" }
]},

"N26": { date: "8 December 1772 — the murder", ord: 17721208, canon: true, parts: [
  { head: "DECEMBER 8.", text: `` },
  { mark: "aGOHOME", text: `He went home as Charlotte bade him, and slept as men sleep before weather.` },
  { mark: "aMASKA", text: `He stayed the evening out, and smiled till the muscle ached, and fooled nobody.` },
  { text: `On the sixth of December the widow's new servant — the man hired into the dismissed lad's place, the man she was to marry — was found dead at his own door. The lad was taken on the —— road, frost in his beard, no denial in his mouth; led past Werther, he said with perfect composure: "No one will now marry her, and she will marry no one."

Werther went hot to the district judge — Charlotte's father, in whose court the matter lay — and pleaded as he had never pleaded: that the crime had grown in the same ground as the man's long fidelity, and by the same husbandry.` },
  { mem: "FEVER", text: `The argument he had once written out fair for Wilhelm — that the self-destroyed and the fever-dead die of the same helplessness — came back to him before the bench, word for word; and it moved no one.` },
  { mem: "SCANDAL", text: `The judge, moreover, had not forgotten the business of the walnut-trees: the warm head was heard coldly.` },
  { mem: "LADWORD", text: `The brother testified, and remembered aloud the meddling stranger who had once spoken for the man.` },
  { mem: "SOLDIER", text: `The enlisting-money he had pressed on the lad was found in the lad's pocket, unspent.` },
  { text: `The precedent, the public security, the ordinary channel: Albert sided with the law, and the law with itself. On a scrap among Werther's papers: "You cannot be saved, unfortunate man! I see clearly that we cannot be saved."` }
], choices: [
  { label: "Fold the scrap in with your papers; everything must follow in the usual course.", to: "N27", canon: true, mark: "aSCRAPF" },
  { label: "Not yet. Somewhere in the world a door has not been shut against you. Ride to-night, and beg the life at it.",
    gate: { flag: "PATRON", pass: "R1", fail: "N28", failMark: "doorshut",
      passLog: "8 December 1772 — you rode through the frost to beg a life.",
      failLog: "8 December 1772 — you rode to beg a life, and found no door open to you." } },
  { label: "See the prisoner once, through the grate of his cell, before the trial.", to: "N27", mark: "cell" }
]},

"N27": { date: "12 December 1772 — the flood", ord: 17721212, canon: true, voice: "letter", parts: [
  { head: "DECEMBER 12.", text: `` },
  { mark: "cell", text: `I have seen his face through the grate, Wilhelm. The flood, this night, spoke with his voice.` },
  { mark: "aSCRAPF", text: `The scrap is folded in with my papers, Wilhelm. Everything follows in the usual course.` },
  { text: `Dear Wilhelm, I am reduced to the condition of those wretches who believe they are pursued by an evil spirit. Last evening the thaw-wind came; toward eleven I heard that the river had risen, and all the vale of Wahlheim was under water. Upon the stroke of twelve I hastened forth, and beheld a fearful sight: the torrents rolling from the mountains in the moonlight; fields and meadows and hedges confounded; the whole valley one storming sea in the roar of the wind! And when the moon came out again and lay upon the black cloud, and the flood rolled and rang before me in that terrible glorious light — a shudder ran over me, and again a longing! With extended arms I stood over the abyss, and breathed: Plunge! plunge! — lost, one moment, in the bliss of hurling down there my torments and my sufferings — to storm along with the billows!` }
], choices: [
  { label: "My hour is not yet come: I feel it. Turn from the edge, and walk home through the drowned meadows.",
    to: "N28", mark: "turned", canon: true },
  { label: "It is come. Down.",
    gate: { flagAbsent: "HOMER", pass: "E6", fail: "N28", failMark: "rooted",
      passLog: "12 December 1772 — you went down with the flood.",
      failLog: "12 December 1772 — you leaned over the abyss, and the earth would not let go of you." } }
]},

"N28": { date: "15–20 December 1772", ord: 17721215, canon: true, voice: "letter", parts: [
  { head: "DECEMBER 15.", mark: "turned", text: `I could not, Wilhelm. I stood, and had no power to plunge; and I felt at last as if rooted to the earth, and incapable of seeking an end to my woes; and I turned, and walked home through the drowned meadows. My hour is not yet come: I feel it is not.

And this night — I tremble at the avowal — I held her in my arms, in dream, locked in a close embrace, and covered her love-whispering lips with countless kisses; my sight swam in the intoxication of her eyes. God! am I punishable for feeling even now a bliss in recalling those glowing joys?` },
  { head: "DECEMBER 15.", mark: "rooted", text: `I willed it, Wilhelm — believe of me hereafter what you can — and my body refused the service. I felt as if rooted to the earth; the wind pressed the wet hat-brim down over my eyes like a hand; and after a time I turned, and walked home through the drowned meadows, quarrelling with my own feet. There are refusals that preserve us, which we never forgive.` },
  { head: "DECEMBER 15.", mark: "doorshut", text: `I rode two nights, Wilhelm, and sat the third in an anteroom, among gentlemen warming their rings at the stove. The great are gracious as the winter sun: much light, and no heat. A secretary heard my petition to the end — a secretary! — and regretted; and regretted. On the road home I passed beneath the gallows-field at ——. Enough. Everything follows in the usual course.` },
  { head: "DECEMBER 20.", text: `It was the Sunday before Christmas. I came to her in the evening and found her alone, making ready the little gifts for her brothers and sisters. "You shall have a gift too, if you behave well," she said, hiding her embarrassment under a sweet smile: "a taper, and something more." — "And what do you call behaving well?" cried I; "how would you have me, dearest Charlotte?" — "Thursday night is Christmas Eve. The children come, and my father; there is something for each; come you then too — but do not come before." I started. — "I ask it of you as a favour, for my own peace. We cannot go on in this manner any longer."

"Why must you love me — me only — me, who belong to another? I fear, I much fear, it is only the impossibility of possessing me which makes your desire so strong." I drew back my hand. "Very wise!" I said; "did Albert furnish you with the remark?" — "Any one might make it," she answered. "Is there not, in the whole world, one maiden who has the power to make you happy?` },
  { mem: "FREDERICA", text: `The vicar's daughter even — Frederica, at S—, whom you liked — who—" and she stopped herself there.` },
  { notMem: "FREDERICA", text: `Conquer yourself; seek such a being, and believe me, you will find her."` },
  { mem: "REFUSED", text: `I refused the bird's kiss once, Wilhelm, in September — you remember with what I paid for it. One does not refuse twice.` },
  { mem: "MASK", text: `I have smiled all this December; the muscle is worn out.` },
  { text: `Albert entered; we saluted coldly, and paced the room past one another; the talk fell; it struck eight; I took my hat and stick. I write this at midnight. It is her voice in everything: only — not before Christmas Eve.` }
], choices: [
  { label: "To-day or never. You will not obey; she shall see you once more.", to: "N29", canon: true },
  { label: "Obey her. Stay these three days away; then come, Christmas Eve, among the children — and be what she can give.",
    gate: { flag: "HOMER", pass: "H1", fail: "N29", failMark: "consent",
      passLog: "21 December 1772 — you obeyed her, and Christmas Eve found you among the children.",
      failLog: "21 December 1772 — you resolved to obey her; your feet resolved otherwise." } }
]},

"N29": { date: "21 December 1772", ord: 17721221, canon: true, voice: "letter", parts: [
  { head: "MONDAY, DECEMBER 21. TO CHARLOTTE.", text: `` },
  { mark: "consent", text: `I resolved to obey you — believe that I resolved it; I wrote it, I said it aloud to my servant, I laid out books against the three days. And at evening my feet had their own counsel. A hundred times upon the way I paused, and stood, and seemed to myself to be turning back; and proceeded notwithstanding. There is no obedience left in me but this last one.` },
  { text: `It is all over, Charlotte: I am resolved to die! I make this declaration deliberately and coolly, without any romantic passion, on the morning of the day when I am to see you for the last time. I have passed a dreadful night — a propitious one; for it has fixed my purpose. One of us three must die: it shall be Werther. O beloved Charlotte! this heart, excited by rage and fury, has often conceived the horrid idea of murdering your husband — you — myself! The lot is cast at length.` },
  { flag: "SCAR", text: `Everything old has come back upon me these weeks — the assembly at the Count's, the faces, the whisper going round the room. It is all one wound, and it has one cure.` },
  { mem: "HALFSAID", text: `You heard me once ask, under the chestnut-trees — should I say for ever? You heard it, Charlotte. I saw you hear it.` },
  { head: "PAST MIDNIGHT.", text: `I have seen you. You did not expect me; you had friends coming who did not come; Albert was away. You bade me read to you, to fill the hour, from my own Ossian; and we went down together through the songs of Selma — the maiden on the hill of storms calling to the silent dead, the father alone on the sea-beaten rock — until I came to that place: "Why dost thou waken me, O spring? Thy voice woos me, exclaiming, I refresh thee with heavenly dews; but the time of my decay is approaching, the storm is nigh that shall wither my leaves. To-morrow shall the traveller come — he shall come, who beheld me in my beauty: his eye shall seek me round the field, but he shall not find me."

The whole force of these words fell upon me. I threw myself at your feet; the world perished for us; I clasped you in my arms and covered your trembling, stammering lips with kisses. You cried my name — my name, three times, each time from farther off — and tore yourself free: "It is the last time, Werther! You shall never see me any more!" And one look, full of love, over your shoulder; and the door; and the key turning.

She loves me! Still burns upon my lips the sacred fire they received from hers. She loves me — and I go before you, my Charlotte, to my Father and to yours.

I came home through rain and snow, and had lost my hat somewhere on the hill, and did not know it till the servant spoke.` }
], choices: [
  { label: "(the letter continues)", to: "N30", canon: true }
]},

"N30": { date: "22 December 1772", ord: 17721222, canon: true, voice: "letter", parts: [
  { head: "TUESDAY, DECEMBER 22.", text: `For the last, last time I open these eyes. Alas! they will behold the sun no more. To die! what is death? We do but dream in our discourse upon it. At this moment I am my own — or rather I am thine, thine, my adored! and the next — parted, severed — perhaps for ever? No, Charlotte, no! How can I, how can you, be annihilated? We exist. What is annihilation? A mere word, an unmeaning sound that fixes no impression on the mind.

At eleven I asked my servant whether Albert was returned, and sent across an open note: "Be so good as to lend me your pistols for a journey. Adieu."` },
  { mem: "WARM", text: `And he said — my friend said it, the man I walked a whole summer beside — "Give him the pistols; I wish him a pleasant journey." It is right, Wilhelm. It is all exactly as it should be.` },
  { notMem: "WARM", text: `He handed the note to her, they tell me, without one word, and said: "Give him the pistols; I wish him a pleasant journey." Correct to the last. We understood one another always.` },
  { text: `They have been in your hands — you wiped the dust from them; the boy saw you tremble as you took them down. I kiss them a thousand times: you have touched them! It was my desire to receive my death from your hands, and my wish is gratified.

I have spent the evening over my papers, and burned many.` },
  { mem: "PICTUREDOWN", text: `Your profile, which I buried among my papers in the February of your marriage, I have disinterred, and I return it to you. Preserve it.` },
  { notMem: "PICTUREDOWN", text: `Your profile, which was so dear to me, I return to you; and I pray you to preserve it.` },
  { mem: "DRAWER", text: `And the ribbon — I have taken it from the drawer where I turned the key on it in the autumn of my other life. It must be buried with me: you gave it me on my birthday.` },
  { notMem: "DRAWER", text: `And the ribbon you gave me on my birthday must be buried with me. I have begged this of your father.` },
  { text: `Past eleven o'clock. All is silent around me, and my soul is calm. Through the driving clouds I see single stars of the eternal heaven. No, you will not fall! The Almighty bears you on his heart, and me. I have looked for the last time on the wain of the Greater Bear: when I left your door at night, Charlotte, it always stood over against your gate.

They are loaded — the clock strikes twelve. I say amen. Charlotte, Charlotte! farewell, farewell!` }
], choices: [
  { label: "(the letter continues)", to: "N31", canon: true }
]},

"N31": { date: "23 December 1772", ord: 17721223, canon: true, editorhead: true,
  ending: "THE SORROWS", endingId: "E1", parts: [
  { text: `A neighbour saw the flash, and heard the report of the pistol; but, as everything remained quiet, he thought no more of it.

At six in the morning the servant entered with a candle, and found his master on the floor, the pistols beside him. The bullet had entered over the right eye. He had drunk one glass only of the wine. "Emilia Galotti" — a tragedy of the day — lay open upon the bureau.

Of Albert's distress, of Charlotte's grief, suffer us to say nothing. At twelve at noon he died. That night, toward eleven, the old steward had him buried in the place he had chosen — the corner of the churchyard, looking toward the fields, under the two lime-trees. The steward and his sons followed the body; Albert could not. Charlotte's life was despaired of. Workmen carried him. No priest attended.` }
], choices: []},

/* ========================= BRANCHES — 1771 ========================= */

"A1": { date: "17 June – 6 July 1771 — the guarded summer", ord: 17710617, canon: false, parts: [
  { head: "JUNE — JULY 1771.", text: `Werther kept his resolution the length of a fortnight, and his drawing prospered on it — the best sheets, he said, he ever made; a guarded heart gives a steady hand. Wilhelm, meanwhile, pressed his old scheme by every post: a secretary's place at the embassy of D—, far to the north, Werther's for a word.

Then, one July evening, Charlotte's whole household was at the fountain: her little sister Jane with the glass — "Charlotte must drink first!" — and Charlotte's plain question, why he never came out to the lodge; was he too grand for a house full of children?

"What is a resolution, Wilhelm? A dam of sand. I hear the water working at it all night."` }
], choices: [
  { label: "Go to-morrow to Charlotte's lodge. What is a resolution against a voice?",
    to: "N06", mark: "aLODGE", log: "6 July 1771 — you sought her out after all (the book resumed you)." },
  { label: "Write the word to Wilhelm to-night: the embassy post at D—, for August.",
    to: "A2", log: "6 July 1771 — you asked for the embassy post before the fever could take." },
  { label: "A week's walking in the high mountains, to starve the thing; then decide.",
    to: "N06", mark: "aSTARVE", log: "July 1771 — you walked a week in the mountains and came down by the lodge road (the book resumed you)." }
]},

"A2": { date: "August–September 1771 — the early embassy", ord: 17710802, canon: false, parts: [
  { head: "AUGUST — SEPTEMBER 1771.", text: `The minister named Werther to the embassy at D—, to present himself before Michaelmas. He rode to the hunting-lodge to take leave of Charlotte; she stood among the children with thread and scissors, and said what one says, and wished him what one wishes. At the door she gave him her hand. He did not kiss it.

"There is a sort of victory that goes dressed in the colours of flight, and a sort of flight in the colours of victory; the tailor who can tell the two coats apart is not yet born."

By Michaelmas he was at his desk, discovering the taste of a tired evening honestly come by.` }
], choices: [
  { label: "Bury yourself in the work till the work is a wall.", to: "N12", mem: "DESKWORK", mark: "aWALLW" },
  { label: "Allow yourself one measured, cousinly letter to Charlotte each month.", to: "N12", mem: "COUSINLY", mark: "aCOUS" }
]},

/* ==================== BRANCH — STAYING AT WAHLHEIM ==================== */

"ST1": { date: "October 1771 — the vintage", ord: 17711008, canon: false, parts: [
  { head: "OCTOBER 1771.", text: `Werther unpacked the trunk, and answered the minister with civilities. Then the vintage: all Wahlheim on the hill, Albert in shirt-sleeves and nearly merry, Charlotte with the shears, the juice-stained children about her like sparrows; Werther carrying baskets till his shoulders sang — "for one whole afternoon precisely as happy as a beast of burden, which is a station in life not sufficiently praised."

At evening, over the new must, Albert took his hand and said he was glad — twice, he said it — that Werther had not gone for the winter. "What sickness is in me, that a man's kindness should lie on my chest like snow-water?"` }
], choices: [
  { label: "Carry baskets; drink the must; be a glad beast of burden while it lasts.", to: "ST2", mark: "aBASK" },
  { label: "Watch Albert being nearly merry, and keep the ledger of it.", to: "ST2", mark: "aWATCH" }
]},

"ST2": { date: "winter 1771–72 at the lodge", ord: 17720112, canon: false, parts: [
  { head: "NOVEMBER — JANUARY.", text: `` },
  { mark: "aBASK", text: `He carried baskets till the vintage was in, and slept those weeks like a ploughman.` },
  { mark: "aWATCH", text: `He watched Albert being nearly merry, and kept the ledger; and the ledger kept him.` },
  { text: `Three evenings a week Werther read aloud — Charlotte at her work, Albert at his documents, half attending, like a man with one boot in the stirrup. He taught the little ones their letters.

The change he set down plainly, as a chronicler: Charlotte had ceased to give him her hand at parting. It was done without one word, the way frost is done. And once, of a neighbour's long-staying guest, she said — not at him, past him, which was her way when it was at him — that the friend of a house is like the clock of a house: valued in its place, wound regularly, and never taken abroad. He laughed with the rest. "I am the friend of the house. I repeated it to my chamber wall until the candle stood in a winding-sheet."` }
], choices: [
  { label: "Laugh with the rest; repeat it to the chamber wall.", to: "ST3", mark: "aWALL2" },
  { label: "Stay away a full fortnight, and see whether the house sends for you.", to: "ST3", mem: "FORTNIGHT" }
]},

"ST3": { date: "20 February 1772 — the wedding", ord: 17720220, canon: false, parts: [
  { head: "FEBRUARY 20, 1772.", text: `` },
  { mark: "aWALL2", text: `He had laughed with the rest, and said it nightly to the chamber wall; and the banns were read.` },
  { mem: "FORTNIGHT", text: `The house had not sent for him. He came back on his own feet, in time for the banns.` },
  { text: `Werther stood among the guests at Charlotte and Albert's wedding, in his blue coat, and saw it done. She wore white; the ring went on; her father wept with a free old man's face; the children strewed winter-green, there being nothing else to strew. Albert's joy was grave and quiet and past all argument, like a title-deed. Once, in turning, her eyes crossed Werther's; and there was in them something that asked — not forgiveness; say rather, something that took leave.

"I stood upright the whole hour, as a man stands in cold water, by mere astonishment." Late, in the crowd at the door, she gave him her hand — before them all, where it could mean nothing — and said, "Good night, dear Werther."` }
], choices: [
  { label: "Leave to-night. A note for the household; the roads are frozen hard, and will carry you anywhere.",
    to: "ST4", log: "20 February 1772 — you fled from the wedding into the winter roads." },
  { label: "Remain. Where should I go? The world is everywhere the same.",
    to: "ST5", mark: "aREMAIN", log: "20 February 1772 — you watched her married, and stayed." },
  { label: "Drink the feast through, and toast them both a shade too loudly.",
    to: "ST5", mem: "TOAST", log: "20 February 1772 — you watched her married, and stayed." }
]},

"ST4": { date: "spring 1772 — the roads", ord: 17720509, canon: false, parts: [
  { head: "MARCH — JUNE 1772.", text: `Werther rode out the wedding night, a note left on the table. Then four towns, whose names he did not trouble to learn. In March, the pilgrimage to his native place: the great elm; the schoolroom become a shop; the stream where a boy had stood surmising the countries the water must pass through. "Man needs but little earth for enjoyment, and still less for his final repose."

From an inn on the —— road: "All my roads have one fault in common: each of them, given time enough, can be made to bend toward a certain valley. I ride away from it by long detours. That is my whole geography now — away from; and the flaw in the method you will have found out long before I confess it."` }
], choices: [
  { label: "Ride farther from the valley, by longer detours.", to: "N19", mark: "aFAR" },
  { label: "Admit the method: all the detours bend home.", to: "N19", mark: "aADMIT" },
  { label: "The players at the inn want a man who can read verse aloud and paint a forest by Friday. Ride with them a stage or two.",
    to: "T1", log: "May 1772 — you rode off with a troupe of players, and the book lost sight of you." }
]},

"ST5": { date: "spring–summer 1772 — the permitted days", ord: 17720710, canon: false, parts: [
  { head: "MARCH — JULY 1772.", text: `` },
  { mark: "aREMAIN", text: `He remained. Where should he have gone? The world is everywhere the same.` },
  { mem: "TOAST", text: `The toast at the feast was remembered against him kindly, which was worse.` },
  { text: `Werther went out to Charlotte's lodge every second day, no oftener — "a calendar of permitted days," kept strict as a merchant's ledger. In June came what he had long heard coming, as one hears a wagon on a far road. Albert had asked her to say it, which was his cleanness and his cruelty in one; she said it walking in the garden, her eyes on her work: "The world talks, Werther. Come to us — come always — but come more seldom."

"More seldom! There is a whole liturgy in it. I answered like a man of sense; I have that grimace by heart now."` }
], choices: [
  { label: "Keep the calendar of permitted days strictly.", to: "N20", mark: "aSTRICT" },
  { label: "Break the calendar once — a Tuesday, unannounced — and see Charlotte's face when the door opens.", to: "N20", mem: "TUESDAY" }
]},

/* ==================== BRANCH — FRÄULEIN B— ==================== */

"L1": { date: "April 1772 — the frost", ord: 17720414, canon: false, parts: [
  { head: "APRIL 1772.", text: `Werther asked for Fräulein B—'s hand that same evening, the dust of the assembly still on his boots. She did not say no; the aunt said everything else. The town talked of nothing else for a month: the aunt's door shut against him — the pedigree in her hall goes back, they say, to a crusader, and every man of it turned in his grave at once, which in so numerous a family makes a considerable noise. The Count of C—, on the evening it broke, crossed the whole assembly-room and gave Werther his arm before them all, talking of Homer.

And Fräulein B— did not bow her head into the wind; she straightened it. "You have chosen a bad season for your wooing," she said at her window: "the whole town is one frost. Come again when it thaws." And she smiled as she said thaws.` }
], choices: [
  { label: "Wait out the frost like a scholar; woo the aunt meanwhile with talk of pedigrees.", to: "L2", mem: "AUNTWOO", mark: "aAUNTW" },
  { label: "A letter a day until it thaws.", to: "L2", mem: "DAILY", mark: "aDAILYL" }
]},

"L2": { date: "May 1772 — the thaw", ord: 17720520, canon: false, parts: [
  { head: "MAY 20.", text: `` },
  { mark: "aAUNTW", text: `April was spent gravely wooing the aunt with pedigrees.` },
  { mark: "aDAILYL", text: `A letter a day had gone to Fräulein B—'s window through the frost.` },
  { text: `"Wilhelm! — I set the word at the head of the letter as one plants a flag on a tower that is taken: she has said yes."

Not to rank, not to the twelve quarterings — to a discharged legation-secretary with a portfolio of drawings and a heart in questionable repair. She said it in the garden, by the espaliered pears, her hands behind her like a girl saying a lesson; and when he could not speak, she laughed, and said the frost had got his tongue, and that it must be quite the last of it. The aunt struck her colours upon terms; the Count promised his carriage and his cook.` }
], choices: [
  { label: "Tell Wilhelm everything to-night.", to: "E2", mark: "aTOLD" },
  { label: "Tell no one for three days; carry it under your coat like a warm loaf.", to: "E2", mark: "aLOAF" }
]},

"E2": { date: "16 June 1772", ord: 17720616, canon: false,
  ending: "THE ANSWER", endingId: "E2", voice: "letter", parts: [
  { head: "JUNE 16, 1772.", text: `` },
  { mark: "aTOLD", text: `You have known it, Wilhelm, since the night I wrote you everything; know it now with dates.` },
  { mark: "aLOAF", text: `I carried it three days under my coat like a warm loaf before even you had it; forgive me.` },
  { text: `To-day, Wilhelm — and you will have remarked the date before my pen could underline it — one year gone since I first crossed a certain threshold and saw a girl in white cutting bread for a swarm of children, and thought heaven had emptied itself into a hunting-lodge — to-day I am married.

Heaven is not emptied, Wilhelm. That was my error, and I publish the retraction: heaven repeats itself. It is the most spendthrift of authors; it writes the same divine sentence into more books than the learned will ever count. Deep blue eyes, this time, and the north in her voice; and when she laughs, the crusader turns in his grave, and I forgive him — for I too know now what it is to be unable to lie still.

I caught myself, at evening under her aunt's lindens, speaking of my happiness in the old wild ruinous words — the whole overflowing dictionary I had believed was printed for grief only — and found it serves for joy without the alteration of a syllable. She heard me out; it is her first miracle, and I have ceased to expect the end of it; and then she said I might keep the dictionary, so long as she kept the man.` },
  { mem: "AUNTWOO", text: `The aunt calls me nephew now without coughing.` },
  { mem: "DAILY", text: `She has my forty letters of the frost in a ribboned bundle, and counts them over like rent.` },
  { flag: "WALTZ", text: `And if some evenings, when there is dancing somewhere in the town and a waltz comes over the gardens, I stand a moment at the dark window — what of it? A man may look once a year toward a country he has left. It is how he knows he has left it.` },
  { text: `Come at Michaelmas. Come sooner. I am to be found under my own pear-trees, translating nothing, grieving at nothing, shading my eyes against nothing but the sun. — W.` },
  { foot: true, text: `Here the correspondence ceases; happiness, unlike sorrow, keeps no journal. The editor, who has followed poor Werther by another road and to another end, gives this bundle without commentary — save to remark that the hand in the later pages grows rounder, and that no sheet is blotted.` }
], choices: []},

/* ==================== BRANCH — THE OFFICE ==================== */

"O1": { date: "April–May 1772 — the apology", ord: 17720401, canon: false, parts: [
  { head: "SPRING 1772.", text: `Werther made his apology — that too: waited upon Madame S—, the noblewoman whose party had whispered him from the Count's room, and inquired after her health; and she was gracious, having gained everything, he being no longer anything. "Nothing in the world costs so little as what has cost everything."

He learned the particles. "I take up my papers, and where I had written a sentence with blood in it, I amend it into one with none; and he reads, and nods, and says: it will do. It does."` },
  { flag: "BELLA", text: `Fräulein B— passed him on the promenade and bowed as one bows to a man one has heard is lately dead — a little afraid of the error either way.` },
  { text: `The Count remained civil; but careful now, as a man is careful of a repaired glass.` }
], choices: [
  { label: "Learn the ambassador's grammar to perfection.", to: "O2", mark: "aGRAM" },
  { label: "Keep one locked drawer of Wahlheim drawings against the winter.", to: "O2", mem: "LOCKED", mark: "aLOCKA" }
]},

"O2": { date: "September 1772 — advancement", ord: 17720903, canon: false, parts: [
  { head: "SEPTEMBER 3.", text: `` },
  { mark: "aGRAM", text: `The grammar was learned to perfection.` },
  { mark: "aLOCKA", text: `One drawer stayed locked, its key unworn.` },
  { text: `The ambassador went to his estates and his gout, and Werther conducted the legation in his absence. The minister wrote that his despatches were models. "They are: I take a young man's living sentence, and I improve it dead, and it will do. Yesterday I returned the new secretary's memorandum with the remark that one may always improve by a more appropriate particle — and heard my own voice go out of me, and it was his voice."

On the desk, come to light from under the winter lists: a sheet of Wahlheim drawings — geese, a plough, two lindens. "There is a smell in old paper, Wilhelm. Toward evening the fact was strongest."` }
], choices: [
  { label: "Enough. Leave the papers as they lie; take the morning mail-coach west, toward Wahlheim.",
    to: "O2B", log: "3 September 1772 — you threw off the office and took the post west (the book resumed you)." },
  { label: "The winter lists must be prepared, and someone must prepare them. Remain.", to: "O3" }
]},

"O2B": { date: "mid-September 1772 — the road west", ord: 17720910, canon: false, parts: [
  { head: "SEPTEMBER 1772.", text: `Three days of roads; then the valley opened at evening like a book left face-down all this while. Werther took his old room at the inn under the lindens, and did not go up to the lodge that night. "To-morrow," he writes — one word, twice underlined.` }
], choices: [
  { label: "Up to the lodge at first light.", to: "N22", mark: "aFIRSTL" },
  { label: "The fountain path first; come at Charlotte by the old stations of the first summer.", to: "N22", mark: "aSTATIONS" }
]},

"O3": { date: "November 1772 — fair copy", ord: 17721130, canon: false, parts: [
  { head: "NOVEMBER 30.", text: `The winter lists were prepared; Werther was confirmed in the conduct of the legation until Easter, with an intimation of more. The Count's assembly received him on a Thursday — the same room. "I looked at the floor by the window, where a man once stood whom the company whispered out of it; and I felt nothing that a gentleman may not feel in company."` },
  { flag: "BELLA", text: `Fräulein B— is betrothed: the Baron F—'s nephew; the pedigree is satisfied. "I signed the register of congratulations in a fair hand. My hand is much remarked upon now."` },
  { text: `"It occurs to me that I have not opened the portfolio since Michaelmas, and that I do not miss it. I set the fact down — a chronicler sets down facts — though I can no longer always tell which of them are wounds."` }
], choices: [
  { label: "Dine with the chancellor on Sundays.", to: "E3", mark: "aCHANC" },
  { label: "Open the portfolio once — and close it.", to: "E3", mem: "OPENED" }
]},

"E3": { date: "23 December 1772", ord: 17721223, canon: false,
  ending: "THE PARTICLE", endingId: "E3", parts: [
  { head: "D—, DECEMBER 23, 1772. TO THE MINISTER.", text: `Excellency! In obedience to the rescript of the 15th instant, the undersigned has the honour to report: that the winter lists are closed; that the accounts of the legation have been examined and found exact; and that the correspondence of the quarter is answered, registered, and filed. Nothing further has occurred that requires to be brought to your Excellency's notice.

The undersigned permits himself, with the season, the expression of his most dutiful respect, and remains, with perfect exactitude, your Excellency's most obedient servant.` },
  { mark: "aCHANC", text: `The undersigned has further the honour to report that he dined, on Sunday last, with the chancellor.` },
  { mem: "OPENED", text: `— postscriptum, in another ink: It snowed to-day past the window the whole forenoon; and the snow put me in mind of something I had looked at once in October, and could not afterward recover.` },
  { mem: "LOCKED", notMem: "OPENED", text: `— postscriptum, in another ink: It snowed to-day past the window the whole forenoon. The locked drawer I did not open.` },
  { notMem: "LOCKED", text: `— postscriptum, in another ink: It snowed to-day past the window the whole forenoon; and the snow put me in mind of something which I could not afterward recover.` },
  { foot: true, text: `On this same night, in another December, a neighbour saw a flash, and heard a report. Here, nothing has occurred that requires to be brought to anyone's notice.` }
], choices: []},

/* ==================== BRANCH — THE MINES ==================== */

"M1": { date: "July–August 1772 — under the earth", ord: 17720808, canon: false, parts: [
  { head: "AUGUST 8.", text: `The mines at last. "One goes in at the hillside as through a needle's eye, stooping behind a lamp; the mountain over one's neck like a held breath; and down, by ladders polished with three generations of hands, into galleries where the water ticks like a house-clock. There is no weather down there. I had promised myself that would be a mercy, my furies being mostly weather; and I report faithfully: it is not a mercy, it is only an absence."

He drew the wheel-house and the great pump, and the Master of the mines swore no draughtsman had done them truer. And on the third evening, on the grass with the green after-image of sunset swimming on the dark, he caught himself measuring — "on the packthread of the heart, which never lies and never learns" — the distance from the gallery's end to a certain valley. The thread ran straight through the mountain.` }
], choices: [
  { label: "Up, and homeward by the straight road.", to: "N21", canon: true, mark: "aUPHOME" },
  { label: "Send Wilhelm the wheel-house drawing first: proof the hand still serves.", to: "N21", mark: "aWHEELA" },
  { label: "The Master of the mines offers winter work: the new galleries want taking up on paper.",
    to: "G1", log: "September 1772 — you signed for the winter below, and the book lost the light of you." }
]},

/* ==================== BRANCH — THE RIDE ==================== */

"R1": { date: "8–11 December 1772 — the ride", ord: 17721211, canon: false, parts: [
  { head: "DECEMBER 11.", text: `Two nights on the roads, the frost like a wolf at the horse's chest. Werther had ridden to the one door in this world that had never been shut against him; stood in the hall in his road-dirt like the messenger in a tragedy; and was heard — heard to the end — in a little cabinet away from the guests. He pleaded the wretch's whole case: that the crime had grown in the same ground as the fidelity, and by the same husbandry.

The great man sat a while with his ring against his teeth. Then: "The wheel is not for this poor devil. I will write to-night; and you shall carry a second letter yourself in the morning, for speed's sake."

"Despair, Wilhelm — I am learned in it — despair is not the truth. It is only the dark, told over as though it were the whole of the astronomy."` }
], choices: [
  { label: "Carry the second letter yourself at dawn, for speed's sake.", to: "E4" },
  { label: "Sleep three hours first; a dead messenger delivers nothing.", to: "E4", mark: "aSLEPT" }
]},

"E4": { date: "24 December 1772", ord: 17721224, canon: false,
  ending: "THE PARDON", endingId: "E4", voice: "letter", parts: [
  { head: "DECEMBER 24, 1772.", text: `` },
  { mark: "aSLEPT", text: `I slept three hours at the inn — the first sleep since the arrest — and lost nothing by it.` },
