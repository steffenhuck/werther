<script id="game">
"use strict";
/* WERTHER — a state-graph adventure through the novel.
   Spine nodes N01–N31 follow Goethe (Boylan tr., condensed); branch nodes are invented.
   Flags: WALTZ, SCAR, BELLA, PATRON, HOMER (absent = Ossian). Marks live one node. */

const S = { node:null, flags:{}, marks:{}, canon:0, visited:{}, divs:[] };
const CANON_TOTAL = 31;

function has(f){ return !!S.flags[f]; }

function partVisible(pt){
  if (pt.flag && !has(pt.flag)) return false;
  if (pt.not && has(pt.not)) return false;
  if (pt.mark && !S.marks[pt.mark]) return false;
  return true;
}

function esc(s){ return smart(s.replace(/&/g,"&amp;").replace(/</g,"&lt;")); }

function smart(s){
  return s
    .replace(/(^|[\s(—])"/g, "$1“")  /* opening double quotes */
    .replace(/"/g, "”")                     /* remaining are closing */
    .replace(/'/g, "’");                    /* apostrophes */
}

function paras(text){
  return text.split(/\n\s*\n/).map(p => "<p>" + esc(p.trim()) + "</p>").join("");
}

function render(n){
  const el = document.getElementById("page");
  let h = "";
  if (n.titlepage){
    h += '<div class="titlepage">'
      + '<p class="sub small">a game of letters, after</p>'
      + "<h1>THE SORROWS OF<br>YOUNG WERTHER</h1>"
      + '<p class="sub small">by J. W. von Goethe &middot; in the translation of R. D. Boylan</p>'
      + '<hr class="rule">'
      + '<div class="editorhead" style="margin-bottom:.6rem">PREFACE.</div>'
      + "</div>";
  }
  else if (n.voice === "editor") h += '<div class="editorhead">THE EDITOR TO THE READER.</div>';
  h += '<div class="parts' + (n.voice === "editor" ? " editor" : "") + '">';
  for (const pt of n.parts){
    if (!partVisible(pt)) continue;
    if (pt.head) h += '<div class="datehead">' + esc(pt.head) + "</div>";
    if (pt.foot) h += '<div class="footnote">' + paras(pt.text) + "</div>";
    else h += paras(pt.text);
  }
  h += "</div>";
  if (n.ending){
    h += finis(n);
  } else if (n.choices && n.choices.length){
    h += '<div class="fleuron">&#10087;</div><div class="choices">';
    n.choices.forEach((c,i)=>{ h += '<button onclick="choose(' + i + ')">&mdash;&nbsp;' + esc(c.label) + "</button>"; });
    h += "</div>";
  }
  el.innerHTML = h;
  window.scrollTo(0,0);
  if (window.goatcounter && window.goatcounter.count)
    window.goatcounter.count({ path: "/werther/" + S.node, title: "Werther: " + S.node, event: true });
}

function verdict(n){
  switch(n.endingId){
    case "E1": return S.divs.length
      ? "You died on Goethe&rsquo;s schedule, though not for want of trying."
      : "You died on Goethe&rsquo;s schedule.";
    case "E2": {
      const first = S.divs.length ? S.divs[0].split(" — ")[0] : "the 16th of June 1771";
      return "You escaped the novel on " + esc(first) + ".";
    }
    case "E3": return "You left the story; the story did not notice.";
    case "E4": return "Goethe&rsquo;s December took a life; you gave one back.";
    case "E5": return "You remained within her orbit, and outside the book.";
    case "E6": return "You left Goethe&rsquo;s path and found the other death waiting.";
  }
  return "";
}

function finis(n){
  let h = '<div class="fin">';
  h += '<div class="finname">FINIS &middot; ' + esc(n.ending) + "</div>";
  h += '<p class="verdict">' + verdict(n) + "</p>";
  h += "<p>You received " + S.canon + " of the one-and-thirty letters that Goethe wrote.</p>";
  if (S.divs.length){
    h += "<p>Where you left the path:</p><ul>";
    for (const d of S.divs) h += "<li>" + esc(d) + "</li>";
    h += "</ul>";
  } else {
    h += "<p>You never left the path.</p>";
  }
  h += '<div class="choices"><button onclick="restart()">&mdash;&nbsp;begin again&nbsp;&mdash;</button></div></div>';
  return h;
}

function enter(id){
  const n = NODES[id];
  if (!n) throw new Error("no node " + id);
  S.node = id;
  if (!S.visited[id]){ S.visited[id] = 1; if (n.canon) S.canon++; }
  if (n.setFlags) n.setFlags.forEach(f => S.flags[f] = 1);
  if (typeof document !== "undefined") render(n);
  return n;
}

function resolveChoice(c){
  /* pure: returns {target, log, failMark} given current flags */
  if (c.gate){
    const ok = (c.gate.flag !== undefined) ? has(c.gate.flag) : !has(c.gate.flagAbsent);
    return { target: ok ? c.gate.pass : c.gate.fail,
             log: ok ? c.gate.passLog : c.gate.failLog,
             failMark: ok ? null : (c.gate.failMark || null) };
  }
  return { target: c.to, log: c.log || null, failMark: null };
}

function choose(i){
  const c = NODES[S.node].choices[i];
  S.marks = {};
  if (c.set) c.set.forEach(f => S.flags[f] = 1);
  const r = resolveChoice(c);
  if (c.mark) S.marks[c.mark] = 1;
  if (r.failMark) S.marks[r.failMark] = 1;
  if (r.log) S.divs.push(r.log);
  enter(r.target);
}

function restart(){
  S.node = null; S.flags = {}; S.marks = {}; S.canon = 0; S.visited = {}; S.divs = [];
  enter("START");
}

const NODES = {

/* ============================== TITLE ============================== */

"START": { date: "", ord: 0, canon: false, titlepage: true, parts: [
  { text: `I have carefully collected whatever I have been able to learn of the story of poor Werther, and here present it to you, knowing that you will thank me for it. To his spirit and character you cannot refuse your admiration and love: to his fate you will not deny your tears.

And thou, good soul, who sufferest the same distress as he endured once, draw comfort from his sorrows; and let this little book be thy friend, if, owing to fortune or through thine own fault, thou canst not find a dearer companion.

One thing more. The reader of a book follows; the reader of this book chooses. The letters are dated, and the days go only forward. One path through them is the path the letters took; whether they must go where they went before — that, good soul, is the question of the whole.` }
], choices: [
  { label: "Begin: Wahlheim, the 4th of May, 1771.", to: "N01", canon: true }
]},

/* ========================= BOOK I — SPINE ========================= */

"N01": { date: "4 May 1771", ord: 17710504, canon: true, parts: [
  { head: "MAY 4, 1771.", text: `How happy I am that I am gone! My dear friend, what a thing is the heart of man! To leave you, from whom I have been inseparable, whom I love so dearly, and yet to feel happy! I know you will forgive me. Poor Leonora! and yet I was not to blame. Was it my fault, that, whilst the peculiar charms of her sister afforded me an agreeable entertainment, a passion for me was engendered in her feeble heart? And yet — am I wholly blameless? Enough: I promise you, my dear friend, I will improve; I will no longer ruminate on every petty vexation which fortune may dispense; I will enjoy the present, and the past shall be for me the past.

Be kind enough to inform my mother that I have seen my aunt, and that her business will go on well — better, indeed, than we had asked. In this trifling affair I have again observed that misunderstandings and neglect occasion more mischief in the world than even malice and wickedness.

For the rest, I am very well off here. Solitude in this terrestrial paradise is a genial balm to my mind, and the young spring cheers with its bounteous promises my oftentimes misgiving heart. Every tree, every bush, is full of flowers; and one might wish himself transformed into a butterfly, to float about in this ocean of perfume, and find his whole existence in it.` }
], choices: [
  { label: "Seal the letter.", to: "N02", canon: true }
]},

"N02": { date: "10–26 May 1771", ord: 17710510, canon: true, parts: [
  { head: "MAY 10.", text: `A wonderful serenity has taken possession of my entire soul, like these sweet mornings of spring which I enjoy with my whole heart. I am so happy, my dear friend, so absorbed in the exquisite sense of mere tranquil existence, that I neglect my talents. I should be incapable of drawing a single stroke at the present moment; and yet I feel that I never was a greater artist than now.` },
  { head: "MAY 13.", text: `You ask if you shall send me books. My dear friend, I beseech you, for the love of God, relieve me from such a yoke! I need no more to be guided, agitated, heated. My heart ferments sufficiently of itself. I want strains to lull me, and I find them to perfection in my Homer. I treat my poor heart like a sick child, and gratify its every fancy.` },
  { head: "MAY 26.", text: `About a league from the town is a place called Wahlheim, delightfully situated on the side of a hill. A good old woman keeps a small inn there; but the chief charm of the spot are two linden-trees, spreading their enormous branches over the little green before the church. I have my table and chair brought out from the inn, drink my coffee there, and read my Homer.

I found the place one afternoon quite deserted, all the world in the fields, but for a boy of four sitting on the ground, holding between his knees a child of six months pressed to his breast with both arms, so that he made it a sort of arm-chair. The sight charmed me. I sat down upon a plough opposite, and sketched this little picture of brotherly tenderness with the greatest delight, adding the hedge, the barn-door, and some broken cart-wheels just as they happened to lie; and I found, after an hour, that I had made a drawing full of interest, without putting in the slightest thing of my own. This confirmed me in my resolution of adhering, for the future, entirely to nature. She alone is inexhaustible, and forms the greatest masters.` }
], choices: [
  { label: "To Wahlheim again to-morrow.", to: "N03", canon: true }
]},

"N03": { date: "30 May – 14 June 1771", ord: 17710530, canon: true, parts: [
  { head: "MAY 30.", text: `If you expect anything grand from this letter you will be sadly mistaken: it relates merely to a peasant-lad, who has excited in me the warmest interest. He is in the service of a young widow at Wahlheim, and spoke so much of his mistress, and praised her so extravagantly, that I could soon see he was desperately in love with her. "She is no longer young," he said; "she was treated so badly by her first husband that she does not mean to marry again" — and from his account it was so evident what incomparable charms she possessed for him, that I should have to repeat his own words to describe the depth of the poor fellow's attachment, truth, and devotion. I have never in my life witnessed intense devotion, such ardent affection, united with so much purity. Do not blame me if I say that the recollection of this innocence haunts me everywhere; and that my own heart, as though enkindled by the flame, glows and burns within me.` },
  { head: "JUNE 14.", text: `Our young people have got up a ball in the country, and I am of the party. I have engaged a good, pretty, but otherwise insignificant sort of girl for my partner; and it is arranged that I hire a carriage, and that we take up on the way her cousin — the daughter of the district judge S—, who keeps her father's house at the hunting-lodge, and eight brothers and sisters with it. Her name is Charlotte.` }
], choices: [
  { label: "The 16th, then.", to: "N04", canon: true }
]},

"N04": { date: "16 June 1771 — the ball", ord: 17710616, canon: true, parts: [
  { head: "JUNE 16.", text: `"Take care," said my partner's aunt as we drove through the park to the hunting-lodge, "that you do not lose your heart. She is already engaged to a very worthy man." The information possessed no interest for me.

I alighted; a maid begged us wait a moment for her mistress. I walked across the court to the well-built house, ascended the steps, and, opening the door, saw before me the most charming spectacle I had ever witnessed. Six children, from eleven to two years old, were swarming about a lady of middle height, with a lovely figure, dressed in a robe of simple white trimmed with pink ribbons. She was holding a loaf of rye bread, and cutting slices for the little ones all round, in proportion to their age and appetite. "Pray forgive me for giving you the trouble to come for me," she said; "dressing, and household cares, had made me forget my children's supper; and they will take it from nobody but me." I uttered some indifferent compliment: but my whole soul was absorbed by her air, her voice, her manner.

In the carriage I found penetration and character in everything she said: every expression brightened her features with new charms, with new rays of genius, which unfolded by degrees as she felt herself understood. She spoke of books like one who reads with her whole heart. I alighted like a man in a dream, and scarcely heard the music that resounded from the illuminated ballroom.

We commenced with a minuet; then she and her partner began an English country dance, and you must imagine my delight when it came to our turn to dance the figure with them. You should see her dance! She dances with her whole heart and soul: her figure all harmony, elegance, and grace, as if she were conscious of nothing else — as if, for the moment, every other thought and feeling were extinct.

As we crossed in the dance, a lady looked at Charlotte with a smile, then held up her finger in a threatening attitude, and repeated twice, in a very significant tone, the name of Albert. "Albert," said Charlotte, giving me her hand for the promenade, "is a worthy man, to whom I am engaged." Now there was nothing new to me in this — the girls had told me of it on the way — and yet it was wholly new, for I had not thought of it in connection with her. Enough: I became confused, got out in the figure, and the whole was near ruined.

The waltzes are forming. It is the custom here for the previous partners to waltz together; but her partner waltzes indifferently, and mine is not permitted; and she is fond of waltzing — she said so, with the most agreeable freedom in the world.` }
], choices: [
  { label: "Propose the exchange of partners. Take her, and let the whole heaven of that evening come down.", to: "N05", set: ["WALTZ"], canon: true },
  { label: "The finger, the smile, the name twice repeated. Keep to your own partner; let another lead her out.",
    to: "A1", log: "16 June 1771 — you did not waltz with her." }
]},

"N05": { date: "16 June – 8 July 1771", ord: 17710616, canon: true, parts: [
  { head: "JUNE 16, CONTINUED.", text: `Never did I dance more lightly. I felt myself more than mortal, holding the loveliest of creatures in my arms, flying with her as rapidly as the wind till I lost sight of every other object; and O Wilhelm, I vowed at that moment, that a maiden whom I loved, or for whom I felt the slightest attachment, never, never should waltz with any one else but with me, if I went to perdition for it! You will understand this.

The storm we had watched in the horizon broke at last over the music; she gathered the frightened company into a round game of counting, and their fears went out like candles, amid boxes on the ear and laughter. When it was over we went to the window. It was still thundering at a distance: a soft rain was pouring down over the country, and filled the air around us with delicious odours. She stood leaning on her elbow; her eyes wandered over the scene; she raised them to the sky, and then turned them upon me; they were moistened with tears; she placed her hand on mine and said, "Klopstock!" At once I remembered the magnificent ode which was in her thoughts: I felt oppressed with the weight of my sensations, and sank under them. I bent over her hand, kissed it in a stream of delicious tears, and again looked up to her eyes. Divine Klopstock! why didst thou not see thy apotheosis in those eyes?` },
  { head: "JUNE 21.", text: `My days are as happy as those reserved by God for his elect; and, whatever be my fate hereafter, I can never say that I have not tasted joy — the purest joy of life. I am completely settled at Wahlheim: from thence it is but half a league to her. Little did I imagine, when I selected it for my walks, that all heaven lay so near.` },
  { head: "JULY 1.", text: `I accompanied her to the vicarage of S—, a small village in the mountains: the good old vicar under his walnut-trees, who gained new life at the sight of her; his wife; his daughter Frederica, a lively good-humoured brunette, with her sombre and jealous Herr Schmidt. On the way home Charlotte chid me, with what tenderness! for the too eager interest I take in everything: it would wear me out, she said, and I ought to spare myself. Yes, my angel! I will spare myself — for your sake.` },
  { head: "JULY 6.", text: `At the fountain this evening her little sister Jane came up the steps with a glass of water, and Marianne would have taken it from her. "No!" cried the child, with the sweetest expression of face, "Charlotte must drink first!" I could have prostrated myself as before the prophet of an Eastern nation.` }
], choices: [
  { label: "Half a league is nothing.", to: "N06", canon: true }
]},

"N06": { date: "13–26 July 1771", ord: 17710713, canon: true, parts: [
  { head: "JULY 13.", not: "WALTZ", text: `You will remind me that I was prudent at the ball, and ask what my prudence has bought me. Nothing, Wilhelm. A man may decline to waltz: my grandmother used to tell of a mountain of loadstone, and of the ships that came too near it, whose every nail flew from them, so that the poor wretches went down amid the disjointed planks. The mountain does not ask whether one danced.` },
  { head: "JULY 13.", flag: "WALTZ", text: `No, I am not deceived. In her dark eyes I read a genuine interest in me and in my fortunes. Yes, I feel it; and I may believe my own heart which tells me — dare I say it? — dare I pronounce the divine words? — that she loves me!` },
  { not: "WALTZ", text: `And I must write it notwithstanding: in her dark eyes I read a genuine interest in me and in my fortunes. I feel it; and I may believe my own heart which tells me — dare I pronounce the divine words? — that she loves me!` },
  { head: "JULY 16.", text: `How my heart beats when by accident I touch her finger, or my feet meet hers under the table! I draw back as if from a furnace; but a secret force impels me forward again, and my senses become disordered. She is to me a sacred being: all passion is still in her presence. There is a melody which she plays on the piano with the touch of an angel, so simple and so spiritual! It is her favourite air; and when she plays the first note, all pain, care, and sorrow disappear from me in a moment.` },
  { head: "JULY 20.", text: `You renew your proposal: that I accompany the ambassador to D—. The minister is well disposed toward me; my mother would see me active; the appointment waits, you say, only upon my word.` },
  { head: "JULY 26.", text: `I have often determined not to see her so frequently. But who could keep such a resolution? Every day I am exposed to the temptation, and promise faithfully that to-morrow I will really stay away: but, when to-morrow comes, I find some irresistible reason for seeing her; and, before I can account for it, I am with her again.` }
], choices: [
  { label: "Answer him: I do not love subordination; and is it not in reality the same, whether I shell peas or count lentils? I remain.", to: "N07", canon: true },
  { label: "Say yes. Let the minister's word be the knife your own hand cannot be: accept the post, and go in August.",
    to: "A2", log: "20 July 1771 — you accepted the embassy post and fled before the fruit could rot." }
]},

"N07": { date: "30 July – 10 August 1771", ord: 17710730, canon: true, parts: [
  { head: "JULY 30.", text: `Albert is arrived, and I must take my departure. Were he the best and noblest of men, and I in every respect his inferior, I could not endure to see him in possession of such a perfect being. Possession! — enough, Wilhelm: her betrothed is here — a fine, worthy fellow, whom one cannot help liking. Fortunately I was not present at their meeting: it would have broken my heart. And he is so considerate: he has not given Charlotte one kiss in my presence. Heaven reward him for it!

I cannot help esteeming Albert. The coolness of his temper contrasts strongly with the impetuosity of mine, which I cannot conceal. He has a great deal of feeling, and is fully sensible of the treasure he possesses in Charlotte. He regards me as a man of sense; and my attachment to her, and the interest I take in all that concerns her, augment his triumph and his love. Be that as it may, my pleasure with Charlotte is over. Call it folly or infatuation — the thing speaks for itself.` },
  { head: "AUGUST 10.", text: `If I were not a fool, I could spend the happiest and most delightful life here. To be admitted into this most charming family; to be loved by the father as a son, by the children as a father, and by Charlotte! — then the noble Albert, who never disturbs my happiness by any appearance of ill-humour, and who loves me, next to Charlotte, better than all the world! Wilhelm, nothing in the world can be more absurd than our connection, and yet the thought of it often moves me to tears.` }
], choices: [
  { label: "And still I take his hand.", to: "N08", canon: true }
]},

"N08": { date: "12 August 1771", ord: 17710812, canon: true, parts: [
  { head: "AUGUST 12.", text: `Certainly Albert is the best fellow in the world. I went yesterday to take leave of him, for the whim had seized me to spend a few days in these mountains, from where I now write to you. As I was walking up and down his room, my eye fell upon his pistols. "Lend me those pistols," said I, "for my journey." He was telling how caution had once cost him dear — a servant, a ramrod left in the barrel, a maid's shattered thumb — and I had ceased to listen; and with a sudden motion I pointed the mouth of the pistol to my forehead, over the right eye. "What do you mean?" cried Albert, turning it aside. "It is not loaded," said I. "And even if not," he answered with impatience, "what can you mean? I cannot comprehend how a man can be so mad as to shoot himself: the bare idea shocks me."

We argued it the length of the afternoon — he with the sound sense of a man who means to keep the road, I with the whole of my heart. "The question," I said at last, "is not whether a man is strong or weak, but whether he is able to endure the measure of his sufferings. It is just as absurd to call a man a coward who destroys himself, as to call a man a coward who dies of a malignant fever." — "Paradox! all paradox!" cried Albert. We parted without conviction on either side. How rarely in this world do men understand each other!` }
], choices: [
  { label: "Take the pistols; walk in the mountains; come back.", to: "N09", canon: true }
]},

"N09": { date: "15–28 August 1771", ord: 17710815, canon: true, parts: [
  { head: "AUGUST 18.", text: `Must it ever be thus — that the source of our happiness must also be the fountain of our misery? The full and ardent sentiment which animated my heart with the love of nature, overwhelming me with a torrent of delight, which brought all paradise before me, has now become an insupportable torment. It is as if a curtain had been drawn from before my eyes, and, instead of prospects of eternal life, the abyss of an ever-open grave yawned before me. Nature has formed nothing that does not consume itself, and every object near it; and so, surrounded by earth and air and all the active powers, I wander on my way with aching heart; and the universe is to me a fearful monster, for ever devouring its own offspring.` },
  { head: "AUGUST 28.", text: `This is my birthday. Early in the morning came a packet from Albert: a little Homer in duodecimo, that I might be spared carrying the great Ernestine edition upon my walks — and one of the pink ribbons Charlotte wore in her dress the first time I saw her, which I had several times begged of her.` },
  { flag: "WALTZ", text: `The very knot, Wilhelm, that my eyes followed the whole length of that first waltz. I kissed it a thousand times, and in every breath inhaled the remembrance of those happy, irrevocable days.` },
  { text: `See how they anticipate every wish, how well they understand those little attentions of friendship, so superior to the costly presents of the great! Such, Wilhelm, is our fate. I do not murmur at it: the flowers of life are but visionary. How many pass away and leave no trace behind; how few yield any fruit; and the fruit itself, how rarely does it ripen!` }
], choices: [
  { label: "A glorious summer — and no way through it.", to: "N10", canon: true }
]},

"N10": { date: "30 August – 3 September 1771", ord: 17710830, canon: true, parts: [
  { head: "AUGUST 30.", text: `Unhappy being that I am! Why do I thus deceive myself? What is to come of all this wild, aimless, endless passion? I cannot pray except to her. My imagination sees nothing but her: all surrounding objects are of no account, except as they relate to her. When I have spent several hours in her company, till I feel completely absorbed by her figure, her grace, the divine expression of her thoughts, my mind becomes gradually excited to the highest excess; my sight grows dim, my hearing confused, my breathing oppressed as if by the hand of a murderer. O Wilhelm, the hermit's cell, his sackcloth and girdle of thorns, would be luxury and indulgence compared with what I suffer. I see no end to this wretchedness except the grave.` },
  { head: "SEPTEMBER 3.", text: `I must away. Thank you, Wilhelm, for determining my wavering purpose. For a whole fortnight I have thought of leaving her. I must away. She is again in town, at the house of a friend. And Albert — yes — I must away. The appointment at the embassy stands open still; the minister waits only upon my word.` }
], choices: [
  { label: "Go. Two hours of farewell to-night, and at sunrise the horses.", to: "N11", canon: true },
  { label: "Unpack the trunk. A man does not outride the sun by turning his horse west. Stay.",
    to: "ST1", log: "3 September 1771 — you refused to leave Wahlheim." }
]},

"N11": { date: "10 September 1771", ord: 17710910, canon: true, parts: [
  { head: "SEPTEMBER 10.", text: `Oh, what a night, Wilhelm! I can henceforth bear anything. I shall never see her again. I have had the courage, in an interview of two hours' duration, not to betray my intention.

Albert had promised to come to Charlotte in the garden immediately after supper. We walked on the terrace under the tall chestnut-trees; the moon rose behind the wooded hill; and we came, talking of many things, to the gloomy recess at the avenue's end. "Whenever I walk by moonlight," she said, "it brings to my remembrance all my beloved and departed friends, and I am filled with thoughts of death and futurity. We shall live again, Werther!" she continued, with a firm but feeling voice; "but shall we know one another again? What do you think? what do you say?"

"Charlotte," I said, as I took her hand in mine, and my eyes filled with tears, "we shall see each other again — here and hereafter we shall meet again." I could say no more.

She spoke of her mother, of the death-bed promise; I threw myself at her feet — but why rehearse it for you? At last she rose. "We shall meet again," I exclaimed: "we shall recognise each other under every possible change!" — "To-morrow, I think," she answered with a smile. Oh, that to-morrow! She little thought, when she drew her hand away from mine —

They walked down the avenue. I stood gazing after them in the moonlight, and stretched out my arms; and her white dress vanished near the garden gate. At sunrise the horses were at the door.` }
], choices: [
  { label: "Northward, then: to D—, and the Second Book.", to: "N12", canon: true }
]},

/* ========================= BOOK II — SPINE ========================= */

"N12": { date: "October–December 1771, at D—", ord: 17711020, canon: true, parts: [
  { head: "NOVEMBER 26, 1771.", text: `I begin to find my situation here tolerable, considering all circumstances. The best of it is that there is plenty to do; and the number of persons, the many new characters, make a varied spectacle before my soul. I have formed the acquaintance of the Count C—, a man of strong understanding and great discernment; but, though he sees farther than other people, he is not on that account cold in his manner: he is capable of inspiring and returning the warmest affection. He took an interest in me on an occasion of business, and perceived at the first word that we understood each other — that he could converse with me in a different tone from what he used with others. It is the greatest and most genuine of pleasures to observe a great mind in sympathy with our own.` },
  { head: "DECEMBER 24.", text: `As I anticipated, the ambassador occasions me infinite annoyance. He is the most punctilious blockhead under heaven, doing everything step by step, with the trifling minuteness of an old woman; a man impossible to please, because he is never pleased with himself. He constantly returns my papers to me, saying, "They will do, but look them over again — one may always improve by using a better word or a more appropriate particle." Then I lose all patience, and wish myself at the devil's.

And the brilliant wretchedness, the weariness, among the silly people whom we meet in society here! The ambition of rank — how they watch, how they toil, to gain but one step! My acquaintance with the count is the only compensation for such an evil.` }
], choices: [
  { label: "Winter, then.", to: "N13", canon: true }
]},

"N13": { date: "January–February 1772", ord: 17720108, canon: true, parts: [
  { head: "JANUARY 20. To Charlotte.", text: `I must write to you from this place, my dear Charlotte, from a small room in a country inn, where I have taken shelter from a severe storm. In that wretched town D—, amongst strangers — strangers indeed to this heart — I have never felt the smallest inclination to write to you; but in this cottage, in this solitude, with the snow and hail beating against my lattice-pane, you are my first thought.

Could you but see me, my dear Charlotte, in the whirl of dissipation — how my senses are dried up, but my heart is at no time full! I enjoy no single moment of happiness. I stand as before a raree-show: I see the little puppets move, and I ask whether it is not an optical illusion; I am amused with these puppets, or, rather, I am myself one of them: but, when I sometimes grasp my neighbour's hand, I feel that it is not natural, and I withdraw mine with a shudder.

I have found but one being here to interest me: a Fräulein B—. She resembles you, my dear Charlotte, if any one can possibly resemble you. She has abundance of soul, which flashes from her deep blue eyes; her rank is a torment to her, and satisfies no one desire of her heart. She would gladly retire from this whirl of fashion, and we often picture to ourselves, whole hours together, a life of undisturbed happiness in distant scenes of rural retirement: and then we speak of you — she renders homage to your merits; not exacted, but voluntary; she loves you, and delights to hear you made the subject of conversation. Adieu! Is Albert with you? And what is he to you? God forgive the question.` },
  { head: "FEBRUARY 8. To Wilhelm.", text: `For a week past we have had the most wretched weather, and to me it is a blessing; for not a single fine day has beamed from the heavens but has been lost to me by somebody's intrusion. You ask me — since you will always be asking — what this Fräulein B— is to me. What shall I answer?` }
], choices: [
  { label: "She is a glass I hold toward the south; through her I look to Wahlheim. Write it so.", to: "N14", canon: true },
  { label: "Or set the glass down, and see her. She is not a likeness; she is a soul entire — and it inclines to me.",
    to: "N14", set: ["BELLA"], log: "8 February 1772 — you looked at Fräulein B— and saw her." }
]},

"N14": { date: "17–20 February 1772", ord: 17720217, canon: true, parts: [
  { head: "FEBRUARY 17.", text: `I fear that my ambassador and I shall not continue much longer together. He complained of me at court, and the minister gave me a reprimand — a gentle one, but a reprimand notwithstanding. I was about to tender my resignation, when there came a private letter from him of so high, noble, and generous a spirit that I submitted with great respect. So now I am at rest for another week. Content and peace of mind are valuable things: I could wish, my dear friend, that these precious jewels were less transitory.` },
  { head: "FEBRUARY 20.", text: `God bless you, my dear friends, and may he grant you that happiness which he denies to me!

I thank you, Albert, for having deceived me. I waited for the news that your wedding-day was fixed; and I intended on that day, with solemnity, to take down Charlotte's profile from the wall, and to bury it with some other papers I possess. You are now united, and her picture still remains here. Well, let it remain! Why should it not? I know that I am still one of your society, that I hold the second place in Charlotte's heart; and I intend to keep it. Oh, I should become mad if she could forget! Albert, that thought is hell! Farewell, Albert — farewell, angel of heaven — farewell, Charlotte!` },
  { flag: "BELLA", text: `I read the news a second time toward evening; and it is with a kind of terror that I record it, Wilhelm: the second reading pained me less than the first. Fräulein B— sat by me at the concert afterward, and I was — I was not unhappy. What is becoming of me?` }
], choices: [
  { label: "March comes on.", to: "N15", canon: true }
]},

"N15": { date: "15–16 March 1772", ord: 17720315, canon: true, setFlags: ["SCAR"], parts: [
  { head: "MARCH 15.", text: `I have just had an adventure which will drive me from this place, and I grind my teeth! Devil! — it is not to be remedied; and you alone are to blame, who spurred and impelled me into a yoke I did not fit. The Count of C— had me to dine; it is the day on which the nobility are accustomed to assemble at his house in the evening. I never once thought of it — never thought that we subalterns do not belong to such society. The company arrived: the honourable Lady S— with her noble consort and their well-laced, flat-necked daughter; and, en passant, they made me their high-born eyes and nostrils. As I heartily detest the whole race, I determined to go, waiting only till the count was free of their prattle — when my Fräulein B— entered. As the sight of her always makes my heart a little whole, I remained, and talked to her behind her chair; and only after a time did I remark that she spoke less freely than usual, with a kind of embarrassment. The whisper went round the room; the women murmured at one end of it with the men. At length the count drew me to a window. "You know our ridiculous customs," he said. "I perceive the company is displeased at your being here. I would not on any account—" "Your excellency," I broke in, "I beg a thousand pardons: I ought to have thought of it before; I know you will forgive this inconsistency. I meant to go long ago; my evil genius detained me." And I smiled, and bowed. He pressed my hand in a manner which said everything. I stole away from the illustrious assembly, drove out to M—, and watched the sun set from the hill, reading in my Homer the glorious passage where Ulysses is the guest of the excellent swineherd. All this was well.

But it is everywhere spoken of; whoever sits down looks at me; my heart is stabbed a hundred ways.` },
  { head: "MARCH 16.", text: `Everything conspires against me. To-day I met Fräulein B— in the walk. I could not refrain from telling her my sense of her altered manner. "O Werther," she said, in a tone of emotion, "you, who know my heart — what did I not suffer for you, from the moment you entered that room! I foresaw it all; a hundred times was I on the point of telling you. I knew the S—s and T—s, with their husbands, would quit the room rather than remain in your company; I knew the count would not break with them. And now so much is said of it! And this morning, Werther, I was compelled to hear your condemnation the whole length of breakfast, and could not — dared not — say half a word in your defence."

Every word she uttered was a dagger to my heart. She did not feel what a mercy it would have been to conceal it all from me. I am still in a state of extreme excitement. I wish some man would dare to jeer me about it, that I might sacrifice him to my resentment! A hundred times have I seized a knife, to give ease to this oppressed heart. Naturalists tell of a noble race of horses that, when heated and over-ridden, instinctively bite open a vein, to breathe more freely. So I: I would open the vein that would procure me everlasting liberty.` }
], choices: [
  { label: "Tender your resignation to the court, and go. Pride is all that remains; carry it away whole.", to: "N16", canon: true },
  { label: "Endure it. Appear at the next assembly with a smooth face; learn the particles; outlast them all.",
    to: "O1", log: "16 March 1772 — you pocketed the affront and remained in the service." },
  { label: "To her aunt's house this evening: ask for Fräulein B—'s hand, and let the whole town whisper at once.",
    gate: { flag: "BELLA", pass: "L1", fail: "N16", failMark: "rebuffed",
      passLog: "16 March 1772 — you asked for Fräulein B—'s hand, and the novel lost you.",
      failLog: "16 March 1772 — you asked for Fräulein B—'s hand; she saw where your heart lay, and refused you." } }
]},

"N16": { date: "24 March – 19 April 1772", ord: 17720324, canon: true, parts: [
  { head: "MARCH 18.", mark: "rebuffed", text: `She received me alone; the aunt's carriage was gone out. And she wept again, Wilhelm — but her voice was even. "You honour me," she said, "and you deceive yourself. I have watched your face when the talk was of a certain lady at Wahlheim. A woman does not take the hand of a man whose face is turned elsewhere, though he offer it never so kindly. Go home, Werther." — Home! Which of my homes did she intend?` },
  { head: "MARCH 24.", text: `I have tendered my resignation to the court, and I hope it will be accepted; you will forgive me for not having first consulted you. Break the news gently to my mother: I am unable to help myself, and she must bear it as she can. It will afflict her that the career which would have made her son first a privy councillor, and then minister, is stopped short. Argue as you will — I am going. And that you may know my destination: the Prince of ——, who finds much pleasure in my company, has heard of my intention, and has invited me to his estates, to pass the spring.` },
  { head: "APRIL 19.", text: `It is granted. I shall not recount with what reluctance it was accorded, nor what the minister wrote: you would only renew your lamentations. The crown prince has sent me, at parting, five-and-twenty ducats, with a word that has moved me to tears.` }
], choices: [
  { label: "Depart without farewells. He pressed your hand at the window; let that suffice.", to: "N17", canon: true },
  { label: "Go first to Count C—: thank him, and leave one friendship standing whole behind you.",
    to: "N17", set: ["PATRON"], mark: "countfriend",
    log: "April 1772 — you went to Count C— and parted from him as a friend." }
]},

"N17": { date: "5–9 May 1772", ord: 17720505, canon: true, parts: [
  { mark: "countfriend", text: `The count kept me to dinner on my last evening, and at parting embraced me. "The courts of this world will shut on you, Werther," he said; "you have a talent for it. When one does, knock at my door: it is not a court." I carry the words with me like the ducats — no, dearer.` },
  { head: "MAY 9.", text: `I have paid my visit to my native place with all the devotion of a pilgrim. By the great elm, a quarter of a league from the village, I left the carriage and went forward on foot. I stood where the schoolroom, in which a good old woman had penned up our childhood, was become a shop; and I followed the stream to the farm, where I would stand of an evening, as a boy, and watch the water run, with wonderful surmises of the countries it must pass through — till my imagination gave out; and still the water ran on and on, and I lost myself in the contemplation of an invisible distance. Exactly so, my dear friend, so bounded and so happy, were the blessed fathers of old; so childlike their feelings and their poetry. Of what importance is it that I have learned, with every schoolboy, that the world is round? Man needs but little earth for enjoyment, and still less for his final repose.

I am now at the prince's hunting-lodge. He is an honest, unaffected man, with whom one can live happily. Yet he values my understanding and talents more highly than my heart, which is my only pride, and the sole fountain of everything — of all strength, all bliss, all misery. The knowledge I possess every one else can acquire: my heart is exclusively my own.` }
], choices: [
  { label: "The spring passes.", to: "N18", canon: true }
]},

"N18": { date: "25 May – 11 June 1772", ord: 17720525, canon: true, parts: [
  { head: "MAY 25.", text: `I have had a plan in my head of which I did not intend to speak until it was accomplished: now that it has failed, I may as well mention it. I wished to enter the army, and had long been desirous of the step: it was, indeed, the chief reason for my coming here with the prince, who is a general in the —— service. During one of our walks together I disclosed my design; he dissuaded me from it; and it would have been madness rather than passion in me not to have listened to his reasons.` },
  { head: "JUNE 11.", text: `Say what you will, I can remain here no longer. Time hangs heavy upon my hands. The prince is as gracious to me as any one could be, and yet I am not at my ease. There is, at bottom, nothing in common between us: he is a man of understanding, but quite of the ordinary kind, and his conversation affords me no more amusement than I should derive from the perusal of a well-written book. I shall remain a week longer, and then — whither? My drawings are the best I have done since I came; the prince has a feeling for art, and would feel truer had he never been fenced round with terminology and its wretched scientific phrases. Sometimes my teeth ache at the words he uses.` }
], choices: [
  { label: "Let the scheme fall. Drift a week longer, and then follow where the heart pulls.", to: "N19", canon: true },
  { label: "Give him not your talents but your truth: this evening tell him everything — Lotte, the count's assembly, the whole map of your ruin.",
    to: "N19", set: ["PATRON"], mark: "candor",
    log: "June 1772 — you opened your heart to the prince, and he became your friend." },
  { label: "Neither camp nor court: go down into the earth instead. Visit the mines in ——, and learn whether the dark holds anything.",
    to: "M1", log: "June 1772 — you went down into the mines instead of back." }
]},

"N19": { date: "16–29 July 1772", ord: 17720716, canon: true, parts: [
  { mark: "candor", text: `The prince heard me to the end — no man has heard me to the end since you, Wilhelm — and at parting he held both my hands. "You are wounded, not worthless," he said; "when the winter of the thing arrives, come to me. I mean it as a standing order." I rode from his gate lighter by half a stone of silence.` },
  { head: "JULY 16.", text: `Once more I am a wanderer, a pilgrim, through the world. But what else are you!` },
  { head: "JULY 18.", text: `Whither am I going? I will tell you in confidence. A fortnight longer I must remain here; and then I have made myself believe that I would visit the mines in ——. But there is nothing in it, at bottom. The fact is, I wish to be near Charlotte again — that is all. I smile at the suggestions of my own heart, and obey its dictates.` },
  { head: "JULY 29.", text: `No, no! it is well — all is well! I — her husband! O God, who gave me being, if thou hadst prepared that happiness for me, my whole life would have been one continual thanksgiving! She would have been happier with me than with him! Albert is not the man to satisfy all the wishes of that heart: a certain want of sensibility, a want — take it as you will — that his heart does not beat in unison at a passage of a beloved book, where mine and Charlotte's meet. But, dear Wilhelm — he loves her with his whole soul; and what does not such a love deserve!` }
], choices: [
  { label: "Wahlheim, then.", to: "N20", canon: true }
]},

"N20": { date: "4–21 August 1772", ord: 17720804, canon: true, parts: [
  { head: "AUGUST 4.", text: `It is not with me alone. All men are disappointed in their hopes, and deceived in their expectations. I visited my good old woman under the lime-trees. Her eldest boy ran out to meet me: his exclamation of joy brought out his mother, who looked much cast down. Her first word was, "Alas! dear sir, my little John is dead" — the youngest of her children. And her husband was returned from Switzerland without a farthing, and had begged his way, and taken a fever upon the road. I could say nothing, but gave the little one something; she begged me to accept a few apples; and I left the place with a sorrowful heart.` },
  { head: "AUGUST 21.", text: `As one turns a hand, so it turns with me. Sometimes a joyful glimpse of life will dawn again — alas, only for a moment! — and then, lost in reverie, I cannot help saying to myself: what if Albert were to die? Yes, she would become — and I should be — and so I pursue the chimera, till it leads me to the edge of a precipice at which I shudder, and from which I shrink back trembling.

When I pass out at the same gate, and along the same road, which first conducted me to Charlotte, my heart sinks at the change that has since taken place. All, all, is altered! No sentiment, no pulsation of my heart, is the same.` }
], choices: [
  { label: "Autumn stands in the trees.", to: "N21", canon: true }
]},

"N21": { date: "3–15 September 1772", ord: 17720903, canon: true, parts: [
  { head: "SEPTEMBER 4.", text: `It is even so! As nature puts on her autumn tints, it becomes autumn with me and around me. My leaves are sere and yellow, and the leaves of the neighbouring trees have already fallen. Do you remember the peasant-lad I wrote of when I first came here — he that served the young widow of Wahlheim? I made inquiries after him now: he is dismissed from his service, they said, and no one would say more. Yesterday I met him by chance on the road, and he told me his story. His passion, he said, had grown upon him daily after my departure, till at last he neither knew what he did nor what he said, nor what was to become of him. He could neither eat nor drink nor sleep; he felt a sense of suffocation; he did what he was not ordered, and forgot what he was; till one day, knowing that his mistress had gone to an upper chamber, he had followed — or, rather, been drawn after her; and, as she proved deaf to his entreaties, he had had recourse to violence. He knows not what happened to him; he called God to witness that his intentions toward her had ever been honourable, and that he desired nothing more sincerely than that they should marry, and pass their lives together. Her brother, who had long hated him, and feared that a second marriage would deprive his own children of her fortune — she being childless — had him put out of the house at length, and made such a noise of the affair that the mistress dared not take him back, even had she wished it. Now she has hired another servant; over him too, it is said, she has fallen out with the brother; and it is asserted for certain that she will marry him. But my informant is firmly resolved not to survive it.

All this is no exaggeration, no fable: I have weakened it rather in the telling. Wilhelm, I read and re-read this history — it is the history of your friend! My fortune has been and will be so; and I am not half so brave, not half so determined, as that poor wretch, with whom I scarcely dare compare myself.` },
  { head: "SEPTEMBER 12.", text: `She has been absent some days; to-day I visited her, and she came to meet me with a canary bird upon her hand, a present for the children. "He shall kiss you too," she said; and she held the bird toward me; and his little beak moved from her mouth to mine, and the pecking touch was like a breath, a foretaste of the sweetest bliss. — She should not do it! She ought not to inflame my imagination with these pictures of heavenly innocence, nor waken my heart from the sleep into which the indifference of life sometimes rocks it. And why not? — She trusts me so!` },
  { head: "SEPTEMBER 15.", text: `One could turn renegade, Wilhelm, at the men who have neither sense nor feeling for the little that still has worth upon earth. You know the walnut-trees under which I sat with Charlotte at the good old vicar's of S— — those glorious trees, God knows what inward joy they always gave me! They are felled. Felled! I could run mad. The new vicar's wife — a sickly, meddling creature, who affects learning and shrugs her shoulders at Lavater's enthusiasm — had them cut down, because the falling leaves made her yard unclean, and the boys' stones at nut-time disturbed her profound meditations. The whole village murmurs; and I can never pardon it.` }
], choices: [
  { label: "October.", to: "N22", canon: true }
]},

"N22": { date: "10–12 October 1772", ord: 17721010, canon: true, parts: [
  { head: "OCTOBER 10.", text: `Only to gaze upon her dark eyes is to me a source of happiness! And what grieves me is that Albert does not seem so happy as he — hoped — as I — should have been — if — I am no friend to these pauses, but here I cannot express it otherwise; and probably I am explicit enough.` },
  { head: "OCTOBER 12.", text: `Ossian has superseded Homer in my heart. To what a world does the illustrious bard carry me! To wander over the heath, with the storm-wind howling round, which bears along, in streaming mist, the spirits of our fathers, by the half-extinguished light of the moon; to find the silver-haired bard upon the vast heath, who seeks the footsteps of his fathers, and finds, alas! only their tombs.

Two books lie on my table now, Wilhelm — hers, and his: the little Homer that came on my birthday with the ribbon, and the Ossian of my own translating. The evenings are drawing in. Which goes with me into the winter?` }
], choices: [
  { label: "Ossian. The mists, the tombs, the voices in the torrent — they know my case.", to: "N23", canon: true },
  { label: "Homer. The hearth, the homecoming, the swineherd's fire: keep the old daylight, though it shame you.",
    to: "N23", set: ["HOMER"], log: "12 October 1772 — you kept to Homer against the mists." }
]},

"N23": { date: "19 October – 22 November 1772", ord: 17721019, canon: true, parts: [
  { head: "OCTOBER 19.", text: `Alas! the void — the fearful void which I feel in my bosom! Sometimes I think, if I could only once — but once — press her to my heart, this dreadful void would be filled.` },
  { not: "HOMER", text: `At evening the mist lies on the meadows and moves; and I persuade myself that it is peopled, and go out to walk among them, the great grey company.` },
  { flag: "HOMER", text: `At evening I read of the swineherd's fire, and of the old dog that knew his master again after twenty years; and for an hour there is something like a roof over me.` },
  { head: "NOVEMBER 3.", text: `Witness, Heaven, how often I lie down in my bed with a wish, and even a hope, that I may never awaken again! And in the morning, when I open my eyes, I behold the sun once more, and am wretched. This heart is now dead: no sentiment can revive it. My eyes are dry; and my senses, no more refreshed by the influence of soft tears, wither and consume my brain. I suffer much, for I have lost the only charm of life — that active, sacred power which created worlds around me: it is no more.` },
  { head: "NOVEMBER 21.", text: `She does not feel, she does not know, that she is preparing a poison which will destroy us both; and I drink deeply of the draught which is to prove my destruction. Yesterday, when I took leave, she seized me by the hand, and said, "Adieu, dear Werther." Dear Werther! It was the first time she ever called me dear: the sound sunk deep into my heart. I have repeated it a hundred times; and last night, on going to bed, and talking to myself of various things, I suddenly said, "Good night, dear Werther!" — and then could not but laugh at myself.` }
], choices: [
  { label: "The cold sets in.", to: "N24", canon: true }
]},

"N24": { date: "24–30 November 1772", ord: 17721124, canon: true, parts: [
  { head: "NOVEMBER 24.", text: `She is sensible of my sufferings. This morning her look pierced my very soul. I found her alone: she was silent, and steadfastly surveyed me. I no longer saw in her face the charms of beauty or the fire of genius: these had disappeared; but I was affected by an expression much more touching — a look of the deepest sympathy, of the softest pity. She had recourse to her piano for relief, and in a low sweet voice accompanied the music. Her lips never appeared so lovely. I was quite overcome; and, bending down, I pronounced this vow: "Beautiful lips, which the angels guard, never will I seek to profane your purity with a kiss." And yet, my friend — oh, I wish — but my heart is darkened by doubt and indecision — could I but taste felicity, and then die to expiate the sin! What sin?` },
  { head: "NOVEMBER 30.", text: `I shall never be myself again! About dinner-time I went to walk by the river-side; a cold, damp easterly wind blew from the mountains. A man in a tattered green coat was scrambling among the rocks, and seemed to be looking for plants. "What do you seek?" I asked. He replied, with a deep sigh, "Flowers — and I can find none." "But it is not the season," said I, with a smile. "There are so many flowers," he said, coming down to me. "In my garden there are roses, and honeysuckle of two sorts: one sort was given me by my father; they grow as plentifully as weeds; I have been looking for them these two days, and cannot find them." I asked what he intended with his flowers. A strange smile overspread his face; he held his finger to his mouth, and said he had promised to gather a nosegay for his mistress. "Oh, she has jewels and crowns besides," said he; "if the states-general would but pay me, I should be quite another man! There was a time when I was so happy — but that is past."

An old woman came seeking him — his mother. "How long has he been so?" I asked her. "Quiet now these six months," she said. "God be thanked that he is so far recovered: for a whole year he was raving, and lay chained in the madhouse. Now he harms no one, only talks for ever of kings and queens. He was such a good, quiet youth; wrote a very fine hand, and helped to maintain me: all at once he fell melancholy, then into a violent fever, then into raving; and now he is as you see." I broke in upon her stream and asked: what time was it, then, that he praised so — in which he had been so happy? "The foolish boy!" she cried, with a smile of compassion: "he means the time when he was completely deranged — the time in the madhouse, when he knew nothing of himself. That he praises for ever."

I was thunderstruck. God of heaven! is this the destiny of man — to be happy only before he has acquired his reason, or after he has lost it? Poor soul — and yet how I envy thy clouded senses! Thou goest forth in hope, to gather flowers for thy queen — in winter — and grievest when thou canst find none, and canst not understand why none are to be found. And I — I go forth without joy, without hope, without design; and I return as I came.` }
], choices: [
  { label: "December.", to: "N25", canon: true }
]},

"N25": { date: "1–6 December 1772", ord: 17721201, canon: true, parts: [
  { head: "DECEMBER 1.", text: `Wilhelm! the man about whom I wrote to you — that man so enviable in his misfortunes — was secretary to Charlotte's father; and a passion for her, which he cherished, concealed, and at length discovered, caused him to be dismissed from his situation. It made him mad. Feel, in these dry words, with what derangement the story seized me when Albert related it — with as much calmness, perhaps, as you will read it.` },
  { head: "DECEMBER 4.", text: `I implore your attention: it is all over with me; I can support this state no longer. To-day I was sitting by her — she was playing upon her piano a succession of melodies, and all the expression! all! all! Her little sister was dressing her doll upon my lap. Tears came into my eyes; I leaned down, and caught sight of her wedding-ring; the tears ran — And suddenly she fell into the old air, that favourite, that divine air, and through my soul went a sensation of comfort, and a memory of all the past, of the bygone days when that air was familiar to me — and then of the dark future. I paced with hasty strides through the room; my heart became convulsed. At length I went up to her, and exclaimed with eagerness, "For Heaven's sake, play that air no more!" She stopped, and looked steadfastly at me. "Werther," she said, with a smile which sunk deep into my heart, "Werther, you are very ill: your dearest food is distasteful to you. But go, I entreat you, and endeavour to compose yourself." I tore myself away. God! thou seest my torments, and wilt end them!` },
  { head: "DECEMBER 6.", text: `How her image haunts me! Waking or asleep, she fills my entire soul. Here, when I close my eyes — here, in my brain, where all the nerves of vision are concentrated — her dark eyes are imprinted: dark as an abyss they open upon me, and absorb my senses.` }
], choices: [
  { label: "What the frost-week brought.", to: "N26", canon: true }
]},

"N26": { date: "8 December 1772 — the murder", ord: 17721208, canon: true, parts: [
  { head: "DECEMBER 8.", text: `I send you, my dear sir, a plain and simple narration of a black business, as a mere chronicler of facts would set it down; you will see why my hand shakes notwithstanding. The widow of Wahlheim's new servant — he that supplanted my poor lad — was found on the ice-grey morning of the sixth, dead at his own door. You know already, before I write it, whose work. They took the lad toward noon, on the road to ——, with the frost in his beard and no denial in his mouth. As they led him past me he turned his eyes upon me in silence, and said, with perfect composure: "No one will now marry her, and she will marry no one."

I went hot to the judge — her father, Wilhelm, her own father's court — and pleaded as I have never pleaded in my life: the man's long service, his honesty, the whole human depth of the thing; that his crime had grown in the same ground where his fidelity grew, and by the same husbandry. I offered — God knows what I did not offer. The old man shook his head; Albert was by, and sided with him: the precedent, the public security, the ordinary channel. I urged at the last that they might connive at the man's escape; at that the judge rose, and rebuked me for the advocate of a murderer: everything, said he, must follow in the usual course.

I have written upon a scrap of paper, which I keep: "You cannot be saved, unfortunate man! I see clearly that we cannot be saved."` }
], choices: [
  { label: "Fold the scrap in with your papers. Everything must follow in the usual course.", to: "N27", canon: true },
  { label: "Not yet. Somewhere in the world there is a door that has not been shut against you. Ride to-night, and beg the life at it.",
    gate: { flag: "PATRON", pass: "R1", fail: "N28", failMark: "doorshut",
      passLog: "8 December 1772 — you rode through the frost to beg a life.",
      failLog: "8 December 1772 — you rode to beg a life, and found no door open to you." } }
]},

"N27": { date: "12 December 1772 — the flood", ord: 17721212, canon: true, parts: [
  { head: "DECEMBER 12.", text: `Dear Wilhelm, I am reduced to the condition of those unfortunate wretches who believe they are pursued by an evil spirit. Sometimes I am oppressed, not by apprehension or fear, but by an inexpressible internal sensation, which weighs upon my heart, and impedes my breath! Then I wander forth at night, even in this tempestuous season, and feel pleasure in surveying the dreadful scenes around me.

Yesterday evening I went forth. A rapid thaw had suddenly set in: I had been informed that the river had risen, that the brooks had all overflowed their banks, and that the whole vale of Wahlheim was under water! Upon the stroke of twelve I hastened forth, and beheld a fearful sight. The foaming torrents rolled from the mountains in the moonlight; fields and meadows, trees and hedges, were confounded together; and the entire valley was converted into a deep lake, agitated by the roaring wind! And when the moon shone forth, and tinged the black clouds with silver, and the impetuous torrent at my feet foamed and resounded with awful and grand impetuosity, I was overcome by a mingled sensation of apprehension and delight. With extended arms I looked down into the yawning abyss, and cried, "Plunge!" — and was lost, for a moment, in the intense delight of ending my sorrows and my sufferings by a plunge into that gulf — of storming along with the billows!` }
], choices: [
  { label: "My hour is not yet come: I feel it. Turn from the edge, and walk home through the drowned meadows.",
    to: "N28", mark: "turned", canon: true },
  { label: "It is come. Down.",
    gate: { flagAbsent: "HOMER", pass: "E6", fail: "N28", failMark: "rooted",
      passLog: "12 December 1772 — you went down with the flood.",
      failLog: "12 December 1772 — you leaned over the abyss, and the earth would not let go of you." } }
]},

"N28": { date: "15–20 December 1772", ord: 17721215, canon: true, parts: [
  { head: "DECEMBER 15.", mark: "turned", text: `I could not, Wilhelm. I stood, and had no power to plunge; and I felt at last as if rooted to the earth, and incapable of seeking an end to my woes; and I turned, and walked home through the drowned meadows. My hour is not yet come: I feel it is not.

And this night — I tremble at the avowal — I held her in my arms, in dream, locked in a close embrace, and covered her love-whispering lips with countless kisses; my sight swam in the intoxication of her eyes. God! am I punishable for feeling even now a bliss in recalling those glowing joys?` },
  { head: "DECEMBER 15.", mark: "rooted", text: `I willed it, Wilhelm — believe of me hereafter what you can — and my body refused the service. I felt as if rooted to the earth; the wind pressed the wet hat-brim down over my eyes like a hand; and after a time — I do not know how long — I turned, and walked home through the drowned meadows, quarrelling with my own feet. There are refusals that preserve us, which we never forgive.` },
  { head: "DECEMBER 15.", mark: "doorshut", text: `I rode two nights, Wilhelm, and sat the third in an anteroom, among gentlemen warming their rings at the stove. The great are gracious as the winter sun: much light, and no heat. A secretary heard my petition to the end — a secretary! — and regretted; and regretted. On the road home I passed beneath the gallows-field at ——. Enough. Everything follows in the usual course.` },
  { head: "DECEMBER 20.", text: `It was the Sunday before Christmas. I came to her in the evening, and found her alone: she was busy preparing some little gifts for her brothers and sisters, which are to be distributed on Christmas Day. I spoke of the delight of the children — of that age when the sudden opening of a door, and the apparition of a tree decked with fruit and sweetmeats and lighted up with wax candles, causes such transports of joy. "You shall have a gift too, if you behave well," said Charlotte, hiding her embarrassment under a sweet smile: "a taper, and something more." — "And what do you call behaving well?" cried I; "what should I do — what can I do, my dear Charlotte?" — "Thursday night," she answered, "is Christmas Eve. The children are all to be here, and my father too: there is a present for each; do you come likewise — but do not come before." I started. — "I desire you will not," she continued: "it must be so. I ask it of you as a favour, for my own peace and tranquillity. We cannot go on in this manner any longer."

"Why must you love me — me only — me, who belong to another? I fear, I much fear, that it is only the impossibility of possessing me which makes your desire for me so strong." I drew back my hand. "'Tis well!" I exclaimed, "'tis very well! Did not Albert furnish you with this reflection? It is profound — a very profound remark." — "A reflection that any one might easily make," she answered; "and is there not, in the whole world, one maiden who has the power to make you happy? Conquer yourself: seek and find such a being; then return hither, and let us enjoy together all the happiness of the most perfect friendship. But however, Werther — do not come again before Christmas Eve."

Albert entered; we saluted each other coldly, and paced the room past one another with mutual embarrassment; the conversation dropped; it struck eight; I took up my hat and stick. I write this at midnight. It is her voice in everything: only — not before Christmas Eve.` }
], choices: [
  { label: "To-day or never. You will not obey; she shall see you once more.", to: "N29", canon: true },
  { label: "Obey her. Stay these three days away; then come, Christmas Eve, among the children — and be what she can give.",
    gate: { flag: "HOMER", pass: "H1", fail: "N29", failMark: "consent",
      passLog: "21 December 1772 — you obeyed her, and Christmas Eve found you among the children.",
      failLog: "21 December 1772 — you resolved to obey her; your feet resolved otherwise." } }
]},

"N29": { date: "21 December 1772", ord: 17721221, canon: true, voice: "editor", parts: [
  { text: `Here the letters of our friend cease to carry him; and what remains, we have been obliged to gather from the mouths of persons well acquainted with his history — from Charlotte, from Albert, from his servant — and from such papers as were found. From this point Werther chose nothing more; and the narration passes, as it must, out of his hands.` },
  { mark: "consent", text: `He had resolved — of this we have certain testimony — to obey her. He wrote it; he said it aloud to his servant; he laid out books against the three days. Yet toward evening on the Monday he took his hat. Upon the way he would often pause, stand still as though in doubt, and seem desirous of returning — but would nevertheless proceed; and so, with a sort of involuntary consent, he came at half-past six into her house.` },
  { flag: "SCAR", text: `His mind, in those last weeks, was oppressed by the recollection of every misfortune of his past life: the mortification he had suffered at the ambassador's, in particular, was revived in his memory, and came again and again into his talk.` },
  { text: `On the Monday morning, the twenty-first of December, he wrote to Charlotte that letter which was found, sealed, on his bureau after his death, and which begins: "It is all over, Charlotte: I am resolved to die! I make this declaration deliberately and coolly, without any romantic passion, on the morning of the day when I am to see you for the last time. One of us three must die: it shall be Werther."

Toward evening he came to her house, and found her alone. The friends she sent for did not come; Albert was away upon business. He was strange and disturbed; and she, to turn the hour, begged him to read aloud from his own translation of the songs of Ossian. He sat down; and, with eyes full of tears, began: "Star of descending night! fair is thy light in the west! thou liftest thy unshorn head from thy cloud; thy steps are stately on thy hill. Farewell, thou silent beam! — Let the light of Ossian's soul arise!" So they went, through the songs of Selma: the maiden on the hill of storms, calling to the silent dead; the father alone on the sea-beat rock; and their own fate was in the misfortunes of the song, and they felt it together, and their tears met. At length he came to that place: "Why dost thou waken me, O spring? Thy voice woos me, exclaiming, I refresh thee with heavenly dews; but the time of my decay is approaching, the storm is nigh that shall wither my leaves. To-morrow shall the traveller come — he shall come, who beheld me in my beauty: his eye shall seek me round the field, but he shall not find me."

The whole force of these words fell upon the unfortunate man. He threw himself at Charlotte's feet in the fullness of despair, and seized her hands. The world disappeared from their eyes. He clasped her in his arms, strained her to his bosom, and covered her trembling, stammering lips with passionate kisses. "Werther!" she cried with a faint voice, turning herself away; "Werther!" — and, at length, with the firm voice of the noblest feeling, "Werther!" He resisted not, and let her go. She tore herself free; and, in anguish and confusion, trembling between love and resentment, she exclaimed: "It is the last time, Werther! You shall never see me any more!" Then, casting one look full of love upon the wretched man, she rushed into the adjoining room, and locked the door behind her.

He reached his own home toward midnight, without his hat, through rain and snow. His hat was afterward found on the point of a rock which overhangs the valley; and it is inconceivable how he could have climbed to it, in a dark and wet night, without falling.` }
], choices: [
  { label: "(turn the page)", to: "N30", canon: true }
]},

"N30": { date: "22 December 1772", ord: 17721222, canon: true, voice: "editor", parts: [
  { text: `The next morning his servant, bringing coffee, found him writing. He was adding to the letter for Charlotte, and these fragments were among what was found:

"For the last, last time I open these eyes. Alas! they will behold the sun no more. To die! what is death? We do but dream in our discourse upon it. I have seen many human beings die; but so straitened is our feeble nature that we have no clear conception of the beginning or the end of our existence. At this moment I am my own — or rather I am thine, thine, my adored! and the next — parted, severed — perhaps for ever? No, Charlotte, no! How can I, how can you, be annihilated? We exist. What is annihilation? A mere word, an unmeaning sound that fixes no impression on the mind."

About eleven o'clock he asked his servant whether Albert had returned; the man answered yes, for he had seen him pass on horseback; upon which Werther sent over the following note, unsealed: "Be so good as to lend me your pistols for a journey. Adieu."

Albert, at his desk among disagreeable letters, handed the note coldly to his wife, saying, "Give him the pistols. — I wish him a pleasant journey," he added, turning to the servant. These words fell upon Charlotte like a thunder-stroke: she rose from her seat half-fainting and unconscious of what she did; walked mechanically toward the wall; took down the weapons with a trembling hand; slowly wiped the dust from them; and would have delayed longer, had not Albert hastened her movements by an impatient look. She delivered the fatal instruments to the boy without being able to utter a word. When the servant told his master that Charlotte herself had given them, and wiped them, he received them with transports of delight. "They have been in your hands — you wiped the dust from them: I kiss them a thousand times — you have touched them. It was my desire to receive my death from your hands, and my wish is gratified."

He spent the evening in arranging his papers: he tore and burned a great many; others he sealed up and directed to Wilhelm. At ten o'clock he ordered his fire to be made up and a bottle of wine to be brought, and sent his servant to bed. Then he wrote:

"Past eleven o'clock! All is silent around me, and my soul is calm. I approach the window, my dearest of friends; and through the driving clouds I behold the stars which illumine the eternal heavens! No, you will not fall: the hand of the Almighty supports both you and me. I have looked for the last time upon the constellation of the Greater Bear: it is my favourite star; for when I bade you farewell at night, Charlotte, and turned my steps from your door, it always shone upon me. What object is there, Charlotte, which fails to summon up your image before me? And this ribbon, which you gave me on my birthday, must be buried with me. How confused it all appears! Little did I then think that I should journey this road. But peace! I pray you, peace!

"They are loaded — the clock strikes twelve. I say amen. Charlotte, Charlotte! farewell, farewell!"` }
], choices: [
  { label: "(turn the page)", to: "N31", canon: true }
]},

"N31": { date: "23 December 1772", ord: 17721223, canon: true, voice: "editor",
  ending: "THE SORROWS", endingId: "E1", parts: [
  { text: `A neighbour saw the flash, and heard the report of the pistol; but, as everything remained quiet, he thought no more of it.

In the morning, at six o'clock, the servant went into Werther's room with a candle. He found his master stretched upon the floor, weltering in his blood, and the pistols at his side. He called, he took him in his arms; no answer — only a rattling breath. He ran for a surgeon, and then to fetch Albert. Charlotte heard the ringing of the bell: a cold shudder seized her limbs. She wakened her husband, and they both rose; the servant, bathed in tears, faltered forth the dreadful news; and Charlotte fell senseless at Albert's feet.

When the surgeon came to the unfortunate man, he was past all help: the pulse still beat; the limbs were cold. The bullet, entering the forehead over the right eye, had penetrated the skull. He had drunk only one glass of the wine. "Emilia Galotti" lay open upon his bureau.

Of Albert's distress, of Charlotte's grief, suffer me to say nothing.

The old steward hastened to the house upon the news, and embraced his dying friend amid a flood of tears. His eldest boys followed him soon after on foot; in speechless sorrow they threw themselves on their knees by the bedside, and kissed his hands and his face; and the eldest, who was his favourite, hung over him till he expired, and then they removed the boy by force. At twelve o'clock at noon Werther breathed his last. The presence of the steward, and the precautions he had adopted, prevented a disturbance; and that night, at the hour of eleven, he caused the body to be interred in the place which Werther had selected for himself — at the corner of the churchyard, looking toward the fields, under the two lime-trees.

The steward and his sons followed the corpse to the grave. Albert was unable to accompany them. Charlotte's life was despaired of. The body was carried by labourers. No priest attended.` }
], choices: []},

/* ========================= BRANCHES — 1771 ========================= */

"A1": { date: "17 June – 6 July 1771 — the guarded summer", ord: 17710617, canon: false, parts: [
  { head: "JUNE 17.", text: `You will laugh at me, Wilhelm — you, who have so long preached prudence to deaf ears, and now find them hearing. I did not waltz with her. Her partner led her out; I kept to my good plain girl and did my figures like a clerk doing sums; and whenever the dark eyes went by me in the turn, I studied the orchestra. There was a storm in the night, and a round game to laugh the ladies out of their fright, and a moment at the open window when the rain came sweet off the fields — I gave that moment to the aunt. Twice wise.

I rose early, and drew. I have finished the two lindens, Wilhelm, and the church behind them, and put not one stroke of my own into it: it is the best sheet I ever made. A guarded heart, it seems, gives a steady hand. You may have the sheet. I find I do not care to keep it.` },
  { head: "JULY 6.", text: `She was at the fountain this evening — I came upon them, her and the little ones, before I knew it. Her sister Jane carried up a glass of water, and Marianne would have taken it from her: "No," cries the child, with the sweetest face in the world, "Charlotte must drink first!" — and I stood there among the geese of the village like a man at a play. She saw me, and gave me her hand, and asked, so simply that the simplicity itself was the wound, why I had never come out to the lodge — whether I was too grand for a house full of children. The little ones knew me again from the courtyard; one of the boys had kept my kreutzer.

Wilhelm, what is a resolution? A dam of sand. I hear the water working at it all night.` }
], choices: [
  { label: "Go to-morrow to the lodge. What is a resolution against a voice?",
    to: "N06", log: "6 July 1771 — you sought her out after all (the book resumed you)." },
  { label: "Write to Wilhelm to-night: ask the minister for the post, and go in August.",
    to: "A2", log: "6 July 1771 — you asked for the embassy post before the fever could take." }
]},

"A2": { date: "August–September 1771 — the early embassy", ord: 17710802, canon: false, parts: [
  { head: "AUGUST 2.", text: `It is done: the minister names me to the embassy at D—, and I am to present myself before Michaelmas. My mother is in a quiet rapture; you have the thanks of the whole household, Wilhelm, and may convey mine to the minister whenever you can do it without my blushing audibly in the letter.

I rode out to the hunting-lodge to take my leave. She stood among the children — where else? — with thread and scissors, mending the summer's damage; and she said what one says, and wished me what one wishes. At the door she gave me her hand. I did not kiss it. There is a sort of victory that goes dressed in the colours of flight, and a sort of flight that goes dressed in the colours of victory; and the tailor who can tell the two coats apart is not yet born.` },
  { head: "SEPTEMBER 30.", text: `Three weeks now at D—. The town is passable, the society a raree-show; the ambassador, they warned me already in the antechamber, is precise as a church-clock, and about as warm. But there is work, Wilhelm — I had forgotten the taste of a tired evening honestly come by. I have my Homer and my portfolio; and if toward nightfall something aches southward, it is no more than a traveller's ache, and I mean to walk it off upon the ramparts.` }
], choices: [
  { label: "Winter comes to D—.", to: "N12", canon: true }
]},

/* ==================== BRANCH — STAYING AT WAHLHEIM ==================== */

"ST1": { date: "October 1771 — the vintage", ord: 17711008, canon: false, parts: [
  { head: "OCTOBER 8, 1771.", text: `Rage at me if you will: I have unpacked the trunk. The minister has his answer, all civilities; my mother has hers, which cost more. You write to me of prospects; I answer you with the vintage. All Wahlheim was on the hill on Saturday: Albert among the vines in his shirt-sleeves, more nearly merry than I have ever seen him; Charlotte with the shears, the juice-stained children about her like sparrows. I carried baskets until my shoulders sang, and was for a whole afternoon precisely as happy as a beast of burden — which is, Wilhelm, a station in life not sufficiently praised.

Only at evening, when the fires were lighted and the new must was tried, Albert took my hand, in that measured kindness of his which I can neither requite nor endure, and said that he was glad — glad, he said it twice — that I had not gone away for the winter. What sickness is in me, that a man's kindness should lie on my chest like snow-water?` }
], choices: [
  { label: "Winter at the lodge.", to: "ST2", canon: false }
]},
